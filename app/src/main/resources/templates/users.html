<!DOCTYPE html>

<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SoundHub Admin User Management</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
          rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
          rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1978e5",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111821",
                        "surface-dark": "#1e293b",
                        "border-dark": "#334155",
                        "text-muted": "#94a3b8"
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-display">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-10 py-4 mb-6">
    <div class="flex items-center gap-4 text-primary">
        <span class="material-symbols-outlined text-3xl">graphic_eq</span>
        <h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-[-0.015em] flex items-center gap-2">
            SoundHub
            <span class="bg-primary/20 text-primary text-xs font-semibold px-2 py-1 rounded-full uppercase tracking-wider">Admin Panel</span>
        </h2>
    </div>
    <div class="flex flex-1 justify-end gap-8">
        <a class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-10 px-6 bg-primary text-white text-sm font-semibold leading-normal shadow-lg shadow-primary/30 hover:bg-primary/90 transition-colors gap-2"
           th:href="@{/}">
            <span class="truncate">Main Page</span>
        </a>
        <a class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-10 px-6 bg-primary text-white text-sm font-semibold leading-normal shadow-lg shadow-primary/30 hover:bg-primary/90 transition-colors gap-2"
           th:href="@{/logout}">
            <span class="truncate">Logout</span>
        </a>
        <a class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-10 px-6 bg-primary text-white text-sm font-semibold leading-normal shadow-lg shadow-primary/30 hover:bg-primary/90 transition-colors gap-2"
           th:href="@{/admin/home}">
            <span class="material-symbols-outlined text-sm">group</span>
            <span class="truncate">Dashboard</span>
        </a>
        <img width="50px" th:src="${currentUser.pictureUrl}" alt="User picture">
    </div>
</header>
<main class="flex-1 flex flex-col w-full max-w-[1200px] mx-auto px-6 py-8">
    <div class="flex flex-col gap-4 mb-8">
        <h1 class="text-3xl font-bold leading-tight tracking-[-0.015em]">User Management</h1>
        <p class="text-text-muted text-sm">Manage user accounts, roles, and permissions across the SoundHub
            platform.</p>
    </div>
    <div class="flex justify-between items-center gap-4 mb-6 bg-surface-dark p-4 rounded-xl border border-border-dark">
        <form th:action="@{/admin/users}" method="get" class="flex-1 flex gap-4">
            <label class="flex-1 flex flex-col h-10">
                <div class="flex w-full flex-1 items-stretch rounded-lg h-full bg-background-light dark:bg-background-dark border border-border-dark focus-within:border-primary transition-colors">
                    <div class="text-text-muted flex items-center justify-center pl-3">
                        <span class="material-symbols-outlined text-xl">search</span>
                    </div>
                    <input class="form-input flex w-full min-w-0 flex-1 bg-transparent border-none text-slate-900 dark:text-slate-100 placeholder:text-text-muted px-3 text-sm focus:ring-0"
                           placeholder="Search users by name"
                           name="name"
                           onchange="this.form.submit()"
                           th:value="${criteria != null ? criteria.getName():''}"
                    />
                </div>
            </label>
            <label class="flex-1 flex flex-col h-10">
                <div class="flex w-full flex-1 items-stretch rounded-lg h-full bg-background-light dark:bg-background-dark border border-border-dark focus-within:border-primary transition-colors">
                    <div class="text-text-muted flex items-center justify-center pl-3">
                        <span class="material-symbols-outlined text-xl">search</span>
                    </div>
                    <input class="form-input flex w-full min-w-0 flex-1 bg-transparent border-none text-slate-900 dark:text-slate-100 placeholder:text-text-muted px-3 text-sm focus:ring-0"
                           placeholder="Search users by username"
                           name="username"
                           onchange="this.form.submit()"
                           th:value="${criteria != null ? criteria.getUsername():''}"
                    />
                </div>
            </label>
            <label class="flex-1 flex flex-col h-10">
                <div class="flex w-full flex-1 items-stretch rounded-lg h-full bg-background-light dark:bg-background-dark border border-border-dark focus-within:border-primary transition-colors">
                    <div class="text-text-muted flex items-center justify-center pl-3">
                        <span class="material-symbols-outlined text-xl">search</span>
                    </div>
                    <input class="form-input flex w-full min-w-0 flex-1 bg-transparent border-none text-slate-900 dark:text-slate-100 placeholder:text-text-muted px-3 text-sm focus:ring-0"
                           placeholder="Search users by email"
                           name="email"
                           onchange="this.form.submit()"
                           th:value="${criteria != null ? criteria.getEmail():''}"
                    />
                </div>
            </label>
        </form>
    </div>
    <div class="overflow-x-auto rounded-xl border border-border-dark bg-surface-dark shadow-sm">
        <table class="w-full text-left border-collapse">
            <thead>
            <tr class="bg-background-dark/50 border-b border-border-dark">
                <th class="px-6 py-4 text-xs font-semibold text-text-muted uppercase tracking-wider w-[5%]">ID</th>
                <th class="px-6 py-4 text-xs font-semibold text-text-muted uppercase tracking-wider w-[25%]">Name</th>
                <th class="px-6 py-4 text-xs font-semibold text-text-muted uppercase tracking-wider w-[20%]">Username
                </th>
                <th class="px-6 py-4 text-xs font-semibold text-text-muted uppercase tracking-wider w-[25%]">Email</th>
                <th class="px-6 py-4 text-xs font-semibold text-text-muted uppercase tracking-wider w-[20%]">Role</th>
                <th class="px-6 py-4 text-xs font-semibold text-text-muted uppercase tracking-wider w-[10%] text-right">
                    Actions
                </th>
            </tr>
            </thead>
            <tbody class="divide-y divide-border-dark" th:each="user : ${users}">
            <tr class="hover:bg-background-dark/30 transition-colors group">
                <td class="px-6 py-4 text-text-muted text-sm font-medium" th:text="${user.id}"></td>
                <td class="px-6 py-4">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-green-500/20 text-green-400 flex items-center justify-center font-bold text-sm">
                            <img width="50px" th:src="${user.pictureUrl}" alt="User picture">
                        </div>
                        <span class="font-medium text-slate-900 dark:text-slate-100" th:text="${user.name}"></span>
                        <span class="font-medium text-slate-900 dark:text-slate-100" th:text="${user.surname}"></span>
                        <span class="ml-2 px-2 py-0.5 rounded text-[10px] font-bold bg-primary/20 text-primary uppercase tracking-wider"
                              th:if="${currentUser.id == user.id}">Current</span>
                    </div>
                </td>
                <td class="px-6 py-4 text-text-muted text-sm" th:text="${user.username}"></td>
                <td class="px-6 py-4 text-text-muted text-sm" th:text="${user.email}"></td>
                <td class="px-6 py-4" th:if="${currentUser.id != user.id}">
                    <div class="relative inline-block w-32">
                        <form th:action="@{/admin/users/update}" method="POST">
                            <input type="hidden" name="id" th:value="${user.id}">
                            <label>
                                <select class="block w-full pl-3 pr-8 py-1.5 text-sm font-medium bg-background-dark border border-border-dark rounded-md text-primary focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary appearance-none cursor-pointer"
                                        name="userType" onchange="this.form.submit()">
                                    <option value="USER"
                                            th:selected="${user.userType.name() == 'USER'}">User
                                    </option>
                                    <option value="MODERATOR"
                                            th:selected="${user.userType.name() == 'MODERATOR'}">Moderator
                                    </option>
                                    <option value="ADMIN"
                                            th:selected="${user.userType.name() == 'ADMIN'}">Admin
                                    </option>
                                </select>
                            </label>
                        </form>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-primary">
                            <span class="material-symbols-outlined text-sm">expand_more</span>
                        </div>
                    </div>
                </td>
                <td class="px-6 py-4 text-right" th:if="${currentUser.id != user.id}">
                    <form th:action="@{/admin/users/update}" method="POST">
                        <input type="hidden" name="id" th:value="${user.id}">
                        <span class="px-6 py-4 text-text-muted text-sm" th:text="${user.userStatus.name()}"></span>
                        <div class="flex justify-end gap-1">
                            <button type="submit"
                                    name="userStatus"
                                    value="BANNED"
                                    class="text-text-muted hover:text-orange-500 transition-colors p-2 rounded-lg hover:bg-orange-500/10 opacity-0 group-hover:opacity-100 focus:opacity-100"
                                    title="Cannot ban current admin">
                                <span class="material-symbols-outlined text-xl">block</span>
                            </button>
                            <button type="submit"
                                    name="userStatus"
                                    value="ENABLED"
                                    class="text-text-muted hover:text-green-500 transition-colors p-2 rounded-lg hover:bg-green-500/10 opacity-0 group-hover:opacity-100 focus:opacity-100"
                                    title="Unban User">
                                <span class="material-symbols-outlined text-xl">check_circle</span>
                            </button>
                            <button type="submit"
                                    name="userStatus"
                                    value="DELETED"
                                    class="text-text-muted hover:text-red-500 transition-colors p-2 rounded-lg hover:bg-red-500/10 opacity-0 group-hover:opacity-100 focus:opacity-100"
                                    title="Cannot delete current admin">
                                <span class="material-symbols-outlined text-xl">delete</span>
                            </button>
                        </div>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
        <div class="flex items-center justify-between px-6 py-3 border-t border-border-dark bg-surface-dark">
            <div class="flex gap-2">
                <a th:href="@{/admin/users(
                    page=${users.number}-1,
                    name=${criteria.name},
                    username=${criteria.username},
                    email=${criteria.email}
                    )}">
                    <button class="px-3 py-1 rounded border border-border-dark text-text-muted hover:bg-background-dark hover:text-slate-100 disabled:opacity-50 disabled:cursor-not-allowed"
                            th:disabled="${!users.hasPrevious()}">
                        Previous
                    </button>
                </a>
                <a th:href="@{/admin/users(
                    page=${users.number+1},
                    name=${criteria.name},
                    username=${criteria.username},
                    email=${criteria.email}
                    )}">
                    <button class="px-3 py-1 rounded border border-border-dark text-text-muted hover:bg-background-dark hover:text-slate-100 disabled:opacity-50 disabled:cursor-not-allowed"
                            th:disabled="${!users.hasNext()}">
                        Next
                    </button>
                </a>
            </div>
        </div>
    </div>
</main>
</body>
</html>
