<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Groups Directory - SoundHub</title>
</head>
<body>
<section>
    <main class="pt-24 pb-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-10">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Groups Directory</h1>
                    <p class="text-gray-500 dark:text-gray-400 mt-2">Discover and connect with your favorite bands and groups.</p>
                </div>

                <div class="flex items-center gap-3">

                    <a th:href="@{/bands/add}"
                       class="flex items-center gap-2 px-4 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full text-sm font-medium text-gray-700 dark:text-gray-200 hover:border-primary/50 dark:hover:border-primary/50 hover:shadow-sm transition-all active:scale-95">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-primary/80" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                        Add Band
                    </a>

                    <div class="relative group w-max">
                        <button class="flex items-center gap-2 px-4 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full text-sm font-medium text-gray-700 dark:text-gray-200 hover:border-primary/50 dark:hover:border-primary/50 hover:shadow-sm transition-all active:scale-95">
                            <i class="fa-solid fa-arrow-down-a-z text-primary/80"></i>
                            <span>Sort: <span th:text="${currentSort == 'name,asc' ? 'A-Z' : (currentSort == 'name,desc' ? 'Z-A' : 'Newest')}">A-Z</span></span>
                            <i class="fa-solid fa-chevron-down text-[10px] ml-1 opacity-50 group-hover:rotate-180 transition-transform duration-300"></i>
                        </button>

                        <div class="absolute right-0 mt-2 w-48 origin-top-right bg-white/95 dark:bg-gray-900/95 backdrop-blur-xl border border-gray-200 dark:border-white/10 rounded-2xl shadow-2xl opacity-0 invisible scale-95 group-hover:opacity-100 group-hover:visible group-hover:scale-100 transition-all duration-200 ease-out py-1.5 z-50">

                            <a th:href="@{/bands(page=1, size=${bands.size}, sort='name,asc')}"
                               th:classappend="${currentSort == 'name,asc'} ? 'bg-primary/10 text-primary font-semibold' : 'text-gray-600 dark:text-gray-300'"
                               class="group/item flex items-center justify-between mx-1.5 px-3 py-2.5 text-sm rounded-xl hover:bg-gray-100 dark:hover:bg-white/10 transition-all active:scale-[0.98]">
                                <span>A - Z</span>
                                <i class="fa-solid fa-check text-[10px]" th:if="${currentSort == 'name,asc'}"></i>
                            </a>

                            <a th:href="@{/bands(page=1, size=${bands.size}, sort='name,desc')}"
                               th:classappend="${currentSort == 'name,desc'} ? 'bg-primary/10 text-primary font-semibold' : 'text-gray-600 dark:text-gray-300'"
                               class="group/item flex items-center justify-between mx-1.5 px-3 py-2.5 text-sm rounded-xl hover:bg-gray-100 dark:hover:bg-white/10 transition-all active:scale-[0.98]">
                                <span>Z - A</span>
                                <i class="fa-solid fa-check text-[10px]" th:if="${currentSort == 'name,desc'}"></i>
                            </a>

                            <div class="my-1.5 border-t border-gray-100 dark:border-white/5 mx-3"></div>

                            <a th:href="@{/bands(page=1, size=${bands.size}, sort='id,desc')}"
                               th:classappend="${currentSort == 'id,desc'} ? 'bg-primary/10 text-primary font-semibold' : 'text-gray-600 dark:text-gray-300'"
                               class="group/item flex items-center justify-between mx-1.5 px-3 py-2.5 text-sm rounded-xl hover:bg-gray-100 dark:hover:bg-white/10 transition-all active:scale-[0.98]">
                                <span>Recently Added</span>
                                <i class="fa-solid fa-check text-[10px]" th:if="${currentSort == 'id,desc'}"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-x-6 gap-y-10">
                <div th:each="band : ${bands.content}" class="flex flex-col items-center group text-center">

                    <div class="relative w-full aspect-square mb-4">

                        <a th:href="@{/bands/preview(id=${band.id})}">
                        <img th:src="@{${band.pictureName}}" th:alt="${band.name}"
                             class="w-full h-full object-contain rounded-2xl shadow-lg group-hover:shadow-primary/30 group-hover:ring-4 ring-primary/50 transition-all duration-300"/>
                        </a>

                        <div class="absolute inset-0 rounded-2xl bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end justify-center gap-2 p-3 pointer-events-none">                            <a th:href="@{/bands/edit(id=${band.id})}"
                               class="flex-1 flex items-center justify-center gap-1.5 py-1.5 rounded-xl text-xs font-semibold
                              bg-white/15 hover:bg-primary/80 text-white border border-white/20 hover:border-primary transition-all backdrop-blur-sm">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" viewBox="0 0 24 24" fill="none"
                                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                </svg>
                                Edit
                            </a>

                            <a th:href="@{/bands/delete(id=${band.id})}"
                               class="flex-1 flex items-center justify-center gap-1.5 py-1.5 rounded-xl text-xs font-semibold
                              bg-white/15 hover:bg-red-500/80 text-white border border-white/20 hover:border-red-400 transition-all backdrop-blur-sm">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" viewBox="0 0 24 24" fill="none"
                                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"/>
                                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                                    <path d="M10 11v6M14 11v6"/>
                                    <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                                </svg>
                                Delete
                            </a>

                        </div>
                    </div>

                    <h3 class="font-bold text-gray-900 dark:text-white truncate w-full" th:text="${band.name}"></h3>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mt-0.5 truncate w-full" th:text="${band.bio}"></p>
                </div>
            </div>
            <div class="flex justify-center mt-6">
                <ul class="inline-flex items-center space-x-2">

                    <li th:if="${bands.hasPrevious()}">
                        <a th:href="@{/bands(page=${bands.number}, size=${bands.size})}"
                           class="px-3 py-1 border rounded hover:bg-gray-200 dark:hover:bg-gray-700">
                            &laquo;
                        </a>
                    </li>
                    <li th:unless="${bands.hasPrevious()}">
                        <span class="px-3 py-1 border rounded text-gray-400 cursor-not-allowed">&laquo;</span>
                    </li>

                    <li th:each="i : ${pageNumbers}">
                        <a th:href="@{/bands(page=${i}, size=${bands.size}, sort=${currentSort})}"
                           th:text="${i}"
                           class="px-3 py-1 border rounded hover:bg-gray-200 dark:hover:bg-gray-700"
                           th:classappend="${i == bands.number + 1} ? ' bg-gray-300 dark:bg-gray-600' : ''"></a>
                    </li>

                    <li th:if="${bands.hasPrevious()}">
                        <a th:href="@{/bands(page=${bands.number}, size=${bands.size}, sort=${currentSort})}" class="px-3 py-1 border rounded hover:bg-gray-200 dark:hover:bg-gray-700">&laquo;</a>
                    </li>

                    <li th:if="${bands.hasNext()}">
                        <a th:href="@{/bands(page=${bands.number + 2}, size=${bands.size}, sort=${currentSort})}" class="px-3 py-1 border rounded hover:bg-gray-200 dark:hover:bg-gray-700">&raquo;</a>
                    </li>

                </ul>
            </div>
        </div>
    </main>

    </div>
</section>
</body>
</html>
