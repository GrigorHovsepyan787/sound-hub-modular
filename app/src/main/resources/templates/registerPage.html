<!DOCTYPE html>

<html class="dark" lang="en"><head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>SoundHub - Create Account</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#1978e5",
            "background-light": "#f6f7f8",
            "background-dark": "#111821",
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "1rem",
            "lg": "2rem",
            "xl": "3rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex min-h-screen w-full flex-col bg-gradient-to-b from-background-dark via-[#0f172a] to-background-dark overflow-x-hidden">
  <!-- Main Container -->
  <div class="layout-container flex h-full grow flex-col">
    <!-- Navigation -->
    <header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-800/50 px-6 md:px-10 py-4 backdrop-blur-md sticky top-0 z-50">
      <div class="flex items-center gap-3 text-primary">
        <div class="size-8 bg-primary/20 rounded flex items-center justify-center">
          <span class="material-symbols-outlined text-primary">equalizer</span>
        </div>
        <h2 class="text-slate-100 text-xl font-bold leading-tight tracking-[-0.015em]">SoundHub</h2>
      </div>
      <button class="flex h-10 w-10 cursor-pointer items-center justify-center rounded-full bg-slate-800 text-slate-300 hover:text-white transition-colors">
        <span class="material-symbols-outlined text-[20px]">notifications</span>
      </button>
    </header>
    <!-- Content Section -->
    <main class="flex flex-1 items-center justify-center p-6 py-12">
      <div class="layout-content-container flex flex-col w-full max-w-[520px] bg-slate-900/40 border border-slate-800 p-8 rounded-xl shadow-2xl backdrop-blur-sm">
        <div class="flex flex-col gap-2 mb-8">
          <h1 class="text-slate-100 text-4xl font-black leading-tight tracking-[-0.033em]">Create Account</h1>
          <p class="text-slate-400 text-base font-normal leading-normal">Join the global community of music creators and fans.</p>
        </div>
        <!-- Registration Form -->
        <form class="flex flex-col gap-5">
          <!-- Profile Picture Upload -->
          <div class="flex flex-col items-center justify-center mb-4">
            <div class="relative group cursor-pointer">
              <div class="w-24 h-24 rounded-full bg-slate-800 border-2 border-dashed border-slate-700 flex flex-col items-center justify-center overflow-hidden group-hover:border-primary transition-colors">
                <span class="material-symbols-outlined text-slate-500 text-3xl group-hover:text-primary">add_a_photo</span>
              </div>
              <div class="absolute bottom-0 right-0 bg-primary p-1.5 rounded-full border-4 border-background-dark">
                <span class="material-symbols-outlined text-white text-[16px]">edit</span>
              </div>
            </div>
            <p class="text-slate-400 text-sm mt-3">Upload profile picture</p>
          </div>
          <!-- Name Fields Row -->
          <div class="flex flex-wrap md:flex-nowrap gap-4">
            <label class="flex flex-col flex-1">
              <span class="text-slate-200 text-sm font-medium pb-2 ml-1">First Name</span>
              <div class="relative group">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">person</span>
                <input class="form-input flex w-full rounded-xl text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary/50 border border-slate-700 bg-slate-800/50 focus:border-primary h-14 pl-12 pr-4 placeholder:text-slate-500 transition-all" placeholder="John" type="text"/>
              </div>
            </label>
            <label class="flex flex-col flex-1">
              <span class="text-slate-200 text-sm font-medium pb-2 ml-1">Surname</span>
              <div class="relative group">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">person</span>
                <input class="form-input flex w-full rounded-xl text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary/50 border border-slate-700 bg-slate-800/50 focus:border-primary h-14 pl-12 pr-4 placeholder:text-slate-500 transition-all" placeholder="Doe" type="text"/>
              </div>
            </label>
          </div>
          <!-- Username -->
          <label class="flex flex-col">
            <span class="text-slate-200 text-sm font-medium pb-2 ml-1">Username</span>
            <div class="relative group">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">alternate_email</span>
              <input class="form-input flex w-full rounded-xl text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary/50 border border-slate-700 bg-slate-800/50 focus:border-primary h-14 pl-12 pr-4 placeholder:text-slate-500 transition-all" placeholder="johndoe123" type="text"/>
            </div>
          </label>
          <!-- Email -->
          <label class="flex flex-col">
            <span class="text-slate-200 text-sm font-medium pb-2 ml-1">Email Address</span>
            <div class="relative group">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">mail</span>
              <input class="form-input flex w-full rounded-xl text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary/50 border border-slate-700 bg-slate-800/50 focus:border-primary h-14 pl-12 pr-4 placeholder:text-slate-500 transition-all" placeholder="email@example.com" type="email"/>
            </div>
          </label>
          <!-- Password -->
          <label class="flex flex-col">
            <span class="text-slate-200 text-sm font-medium pb-2 ml-1">Password</span>
            <div class="relative group">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">lock</span>
              <input class="form-input flex w-full rounded-xl text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary/50 border border-slate-700 bg-slate-800/50 focus:border-primary h-14 pl-12 pr-12 placeholder:text-slate-500 transition-all" placeholder="••••••••" type="password"/>
              <button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300" type="button">
                <span class="material-symbols-outlined text-[20px]">visibility</span>
              </button>
            </div>
          </label>
          <!-- Submit Button -->
          <button class="mt-4 flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 bg-primary text-slate-100 font-bold leading-normal tracking-[0.015em] hover:bg-primary/90 transition-all active:scale-[0.98] shadow-lg shadow-primary/20" type="submit">
            Sign Up
          </button>
        </form>
        <!-- Footer Links -->
        <div class="mt-8 flex flex-col items-center gap-4">
          <p class="text-slate-400 text-sm">
            By signing up, you agree to our <a class="text-primary hover:underline" href="#">Terms of Service</a>
          </p>
          <div class="h-px w-full bg-slate-800 my-2"></div>
          <p class="text-slate-400 text-base">
            Already have an account? <a class="text-primary font-bold hover:underline" href="#">Log in</a>
          </p>
        </div>
      </div>
    </main>
    <!-- Footer Decor -->
    <footer class="p-8 text-center text-slate-600 text-xs">
      © 2024 SoundHub. All rights reserved.
    </footer>
  </div>
</div>
</body></html>
