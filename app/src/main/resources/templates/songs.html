<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
    <title th:text="#{songs.pageTitle}">Songs Directory - SoundHub</title>
</head>

<body>
<section class="pt-24 pb-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-10">
            <div>
                <h2 class="text-3xl font-bold text-gray-900 dark:text-white" th:text="#{songs.title}">Songs</h2>
                <p class="text-gray-500 dark:text-gray-400 mt-2" th:text="#{songs.subtitle}">
                    Discover your next favorite track. Explore our vast library of millions of songs across every genre
                    imaginable.
                </p>
            </div>

            <div class="flex items-center gap-3">
                <a th:href="@{/songs/add}"
                   class="flex items-center gap-2 px-4 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full text-sm font-medium text-gray-700 dark:text-gray-200 hover:border-primary/50 dark:hover:border-primary/50 hover:shadow-sm transition-all active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-primary/80" viewBox="0 0 24 24"
                         fill="none"
                         stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    <span th:text="#{songs.addSong}">Add Song</span>
                </a>

                <div class="relative group w-max">
                    <button class="flex items-center gap-2 px-4 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full text-sm font-medium text-gray-700 dark:text-gray-200 hover:border-primary/50 dark:hover:border-primary/50 hover:shadow-sm transition-all active:scale-95">
                        <i class="fa-solid fa-arrow-down-a-z text-primary/80"></i>
                        <span th:text="#{songs.sort.label}">Sort</span>: <span
                            th:with="az=#{songs.sort.az},za=#{songs.sort.za},newest=#{songs.sort.newest}"
                            th:text="${currentSort == 'title,asc' ? az : (currentSort == 'title,desc' ? za : newest)}">Newest</span>
                        <i class="fa-solid fa-chevron-down text-[10px] ml-1 opacity-50 group-hover:rotate-180 transition-transform duration-300"></i>
                    </button>

                    <div class="absolute right-0 mt-2 w-48 origin-top-right bg-white/95 dark:bg-gray-900/95 backdrop-blur-xl border border-gray-200 dark:border-white/10 rounded-2xl shadow-2xl opacity-0 invisible scale-95 group-hover:opacity-100 group-hover:visible group-hover:scale-100 transition-all duration-200 ease-out py-1.5 z-50">
                        <a th:href="@{/songs(page=0, size=${songs.size}, sort='title,asc')}"
                           th:classappend="${currentSort == 'title,asc'} ? 'bg-primary/10 text-primary font-semibold' : 'text-gray-600 dark:text-gray-300'"
                           class="group/item flex items-center justify-between mx-1.5 px-3 py-2.5 text-sm rounded-xl hover:bg-gray-100 dark:hover:bg-white/10 transition-all active:scale-[0.98]">
                            <span th:text="#{songs.sort.az}">A - Z</span>
                            <i class="fa-solid fa-check text-[10px]" th:if="${currentSort == 'title,asc'}"></i>
                        </a>

                        <a th:href="@{/songs(page=0, size=${songs.size}, sort='title,desc')}"
                           th:classappend="${currentSort == 'title,desc'} ? 'bg-primary/10 text-primary font-semibold' : 'text-gray-600 dark:text-gray-300'"
                           class="group/item flex items-center justify-between mx-1.5 px-3 py-2.5 text-sm rounded-xl hover:bg-gray-100 dark:hover:bg-white/10 transition-all active:scale-[0.98]">
                            <span th:text="#{songs.sort.za}">Z - A</span>
                            <i class="fa-solid fa-check text-[10px]" th:if="${currentSort == 'title,desc'}"></i>
                        </a>

                        <div class="my-1.5 border-t border-gray-100 dark:border-white/5 mx-3"></div>

                        <a th:href="@{/songs(page=0, size=${songs.size}, sort='id,desc')}"
                           th:classappend="${currentSort == 'id,desc'} ? 'bg-primary/10 text-primary font-semibold' : 'text-gray-600 dark:text-gray-300'"
                           class="group/item flex items-center justify-between mx-1.5 px-3 py-2.5 text-sm rounded-xl hover:bg-gray-100 dark:hover:bg-white/10 transition-all active:scale-[0.98]">
                            <span th:text="#{songs.sort.newest}">Recently Added</span>
                            <i class="fa-solid fa-check text-[10px]" th:if="${currentSort == 'id,desc'}"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white dark:bg-slate-900/50 rounded-2xl border border-slate-200 dark:border-slate-800 overflow-hidden mb-12 shadow-sm">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                    <tr class="border-b border-slate-200 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-800/50">
                        <th class="py-4 px-4"></th>
                        <th class="py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-400"
                            th:text="#{songs.table.title}">Title
                        </th>
                        <th class="py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-400"
                            th:text="#{songs.table.performer}">Performer
                        </th>
                        <th class="py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-400 hidden md:table-cell">

                            <div class="flex items-center gap-2">
                                <span th:text="#{songs.table.genre}">Genre</span>

                                <select id="genreFilter"
                                        class="text-xs bg-transparent border border-slate-300 dark:border-slate-700 rounded px-1 py-[2px]"
                                        th:data-sort="${currentSort}"
                                        th:data-size="${songs.size}">

                                    <option value=""
                                            th:selected="${selectedGenre == null or #strings.isEmpty(selectedGenre)}">
                                        All
                                    </option>

                                    <option th:each="g : ${genres}"
                                            th:value="${g}"
                                            th:text="${g}"
                                            th:selected="${selectedGenre != null and #strings.equals(g.toString(), selectedGenre)}">
                                    </option>
                                </select>
                            </div>

                            <input type="hidden" name="sort" th:value="${currentSort}"/>
                            <input type="hidden" name="size" th:value="${songs.size}"/>
                            <input type="hidden" name="page" value="0"/>

                        </th>
                        <th class="py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-400 text-right"
                            th:text="#{songs.table.duration}">
                            Duration
                        </th>
                        <th class="py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-400 text-right"
                            th:text="#{songs.table.plays}">Play Count
                        </th>
                        <th class="py-4 px-4"></th>
                    </tr>
                    </thead>
                    <tbody id="songsTableBody" class="divide-y divide-slate-100 dark:divide-slate-800">
                    <tr th:each="song : ${songs.content}"
                        class="group hover:bg-slate-50 dark:hover:bg-white/5 transition-all cursor-pointer">

                        <td class="py-4 px-4">
                            <button type="button"
                                    th:data-id="${song.id}"
                                    th:data-title="${song.title}"
                                    th:data-performer="${song.performer}"
                                    th:data-url="${song.songUrl}"
                                    data-play-btn
                                    class="w-10 h-10 flex items-center justify-center rounded-full bg-transparent
                            group-hover:bg-brand-accent group-hover:text-white transition-all text-slate-400">
                                <i class="fa-solid fa-play text-sm ml-0.5"></i>
                            </button>
                        </td>

                        <td class="py-4 px-6">
                            <a class="block font-semibold text-slate-900 dark:text-white"
                               th:text="${song.title}"
                               th:href="@{/songs/preview(id=${song.id})}"></a>
                            <div class="md:hidden" th:if="${song.bandId == null && song.artistId != null}">
                                <a th:href="@{/artists/preview(id=${song.artistId})}"
                                   class="text-xs text-slate-500 hover:underline"
                                   th:text="${song.performer}"></a>
                            </div>
                        </td>

                        <td class="py-4 px-6 hidden md:table-cell">
                            <div th:if="${song.bandId != null}">
                                <a th:href="@{/bands/preview(id=${song.bandId})}"
                                   class="flex items-center gap-3 p-2 rounded-xl hover:bg-slate-300/50 dark:hover:bg-slate-700/50 transition-colors group">
                                    <span class="text-sm font-semibold text-slate-900 dark:text-white"
                                          th:text="${song.performer}"></span>
                                </a>
                            </div>
                            <div th:if="${song.bandId == null && song.artistId != null}">
                                <a th:href="@{/artists/preview(id=${song.artistId})}"
                                   class="flex items-center gap-3 p-2 rounded-xl hover:bg-slate-300/50 dark:hover:bg-slate-700/50 transition-colors group">
                                    <span class="text-sm font-semibold text-slate-900 dark:text-white"
                                          th:text="${#strings.isEmpty(song.artistNickname) ? song.artistFullName : song.artistNickname}">
                                    </span>
                                </a>
                            </div>
                        </td>

                        <td class="py-4 px-6 hidden lg:table-cell">
                            <span class="px-2 py-1 text-[10px] font-bold uppercase tracking-widest bg-slate-100 dark:bg-slate-800 text-slate-500 rounded-md"
                                  th:text="${song.genre}"></span>
                        </td>

                        <td class="py-4 px-6 text-right font-mono text-sm text-slate-500"
                            th:text="${song.durationFormatted}">
                        </td>

                        <td class="py-4 px-6 text-right">
                            <div class="flex items-center justify-end gap-1 text-slate-400">
                                <i class="fa-solid fa-headphones text-sm"></i>
                                <span class="text-sm font-mono" th:text="${song.playCount}"></span>
                            </div>
                        </td>

                        <td class="py-4 px-4 text-right">
                            <a th:href="@{/songs/delete(id=${song.id})}"
                               th:onclick="|return confirm('#{songs.confirm.delete}')|"
                               class="w-8 h-8 inline-flex items-center justify-center rounded-full text-slate-400 hover:bg-red-100 hover:text-red-500 dark:hover:bg-red-500/10 transition-all">
                                <i class="fa-solid fa-trash text-xs"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <script>
            (function () {
                const buttons = Array.from(document.querySelectorAll('[data-play-btn]'));
                const songs = buttons.map(btn => ({
                    id: btn.dataset.id,
                    title: btn.dataset.title,
                    performer: btn.dataset.performer,
                    url: btn.dataset.url,
                }));
                document.dispatchEvent(new CustomEvent('soundhub:register', {detail: {songs}}));

                buttons.forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.dispatchEvent(new CustomEvent('soundhub:play', {
                            detail: {
                                id: btn.dataset.id,
                                title: btn.dataset.title,
                                performer: btn.dataset.performer,
                                url: btn.dataset.url,
                                songs: songs,
                            }
                        }));
                    });
                });
            })();
            document.getElementById('genreFilter').addEventListener('change', async function () {
                const genre = this.value;
                const sort = this.dataset.sort;
                const size = this.dataset.size;

                const url = `/songs?page=0&size=${size}&sort=${sort}&genre=${genre}`;

                try {
                    const res = await fetch(url);
                    const html = await res.text();

                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');

                    const newBody = doc.querySelector('#songsTableBody');
                    const currentBody = document.querySelector('#songsTableBody');

                    currentBody.innerHTML = newBody.innerHTML;

                    bindPlayButtons();

                } catch (e) {
                    console.error('Filter failed:', e);
                }
            });


            function bindPlayButtons() {
                const buttons = Array.from(document.querySelectorAll('[data-play-btn]'));

                const songs = buttons.map(btn => ({
                    id: btn.dataset.id,
                    title: btn.dataset.title,
                    performer: btn.dataset.performer,
                    url: btn.dataset.url,
                }));

                document.dispatchEvent(new CustomEvent('soundhub:register', {detail: {songs}}));

                buttons.forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.dispatchEvent(new CustomEvent('soundhub:play', {
                            detail: {
                                id: btn.dataset.id,
                                title: btn.dataset.title,
                                performer: btn.dataset.performer,
                                url: btn.dataset.url,
                                songs: songs,
                            }
                        }));
                    });
                });
            }

            bindPlayButtons();
        </script>

        <div class="flex justify-center mt-6">
            <ul class="inline-flex items-center space-x-2">
                <li th:if="${songs.hasPrevious()}">
                    <a th:href="@{/songs(page=${songs.number - 1}, size=${songs.size}, sort=${currentSort})}"
                       class="px-3 py-1 border rounded hover:bg-gray-200 dark:hover:bg-gray-700">&laquo;</a>
                </li>
                <li th:unless="${songs.hasPrevious()}">
                    <span class="px-3 py-1 border rounded text-gray-400 cursor-not-allowed">&laquo;</span>
                </li>
                <li th:each="i : ${pageNumbers}">
                    <a th:href="@{/songs(page=${i - 1}, size=${songs.size}, sort=${currentSort})}"
                       th:text="${i}"
                       class="px-3 py-1 border rounded hover:bg-gray-200 dark:hover:bg-gray-700"
                       th:classappend="${i == songs.number + 1} ? ' bg-gray-300 dark:bg-gray-600' : ''">
                    </a>
                </li>
                <li th:if="${songs.hasNext()}">
                    <a th:href="@{/songs(page=${songs.number + 1}, size=${songs.size}, sort=${currentSort})}"
                       class="px-3 py-1 border rounded hover:bg-gray-200 dark:hover:bg-gray-700">&raquo;</a>
                </li>
                <li th:unless="${songs.hasNext()}">
                    <span class="px-3 py-1 border rounded text-gray-400 cursor-not-allowed">&raquo;</span>
                </li>
            </ul>
        </div>
    </div>
</section>
</body>
</html>
