<!DOCTYPE html>

<html class="dark" lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
          rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
          rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1978e5",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111821",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1,
            'wght' 400,
            'GRAD' 0,
            'opsz' 24

</head>
<body>
<section
        class="bg-background-light dark:bg-background-dark font-display min-h-screen text-slate-900 dark:text-slate-100 flex flex-col overflow-x-hidden">
    <div class="layout-container flex h-full grow flex-col">
        <main class="flex flex-1 justify-center py-8 px-10">
            <div class="layout-content-container flex flex-col max-w-[1200px] flex-1 w-full">
                <div class="flex flex-wrap justify-between gap-3 mb-8">
                    <h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-3xl font-bold leading-tight min-w-72">
                        Create New Album</h1>
                </div>
                <form th:action="@{/albums/add}" method="post" enctype="multipart/form-data">
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                    <div class="lg:col-span-4 flex flex-col gap-4">
                        <p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal">Album

                        <div class="bg-slate-100 dark:bg-slate-800 border-2 border-dashed border-slate-300 dark:border-slate-700 hover:border-primary dark:hover:border-primary transition-colors flex flex-col items-center justify-center rounded-xl p-8 aspect-square cursor-pointer group">

                            <p class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight mb-2">
                                Upload Cover</p>
                            <p class="text-slate-500 dark:text-slate-400 text-sm text-center">Drag and drop or click
                                to select a high-resolution image</p>
                        </div>
                    </div>
                    <div class="lg:col-span-8 flex flex-col gap-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                                       placeholder="Enter album title" value=""/>
                            </label>
                            <label class="flex flex-col flex-1">
                                <p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2">
                                    Release Year</p>

                                    <option value="2024">2024</option>
                                    <option value="2023">2023</option>
                                    <option value="2022">2022</option>
                                    <option value="2021">2021</option>
                                </select>
                            </label>
                        </div>

                                        <div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-8 border border-slate-200 dark:border-slate-700"
                                             data-alt="Artist avatar placeholder"

                                <div class="p-4 border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800">
                                    <p class="text-slate-900 dark:text-slate-100 text-base font-bold leading-normal pb-3">

                                        <div class="text-slate-400 flex items-center justify-center pl-3">
                                            <span class="material-symbols-outlined text-[20px]">search</span>
                                        </div>
                                        <input class="form-input flex w-full min-w-0 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-0 border-none bg-transparent h-full placeholder:text-slate-400 px-3 text-sm"
                                               placeholder="Search bands..."/>

                                        <input class="form-checkbox rounded text-primary border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 focus:ring-primary focus:ring-offset-background-light dark:focus:ring-offset-background-dark size-5"

                                        <div class="bg-center bg-no-repeat aspect-square bg-cover rounded-lg size-8 border border-slate-200 dark:border-slate-700"

                                        <div class="bg-center bg-no-repeat aspect-square bg-cover rounded-lg size-8 border border-slate-200 dark:border-slate-700"

                                        <span class="text-slate-800 dark:text-slate-200 text-sm font-medium">Neon Syndicate</span>
                                    </label>
                                    <label class="flex items-center gap-3 p-3 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-lg cursor-pointer transition-colors">
                                        <input class="form-checkbox rounded text-primary border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 focus:ring-primary focus:ring-offset-background-light dark:focus:ring-offset-background-dark size-5"
                                               type="checkbox"/>
                                        <div class="bg-center bg-no-repeat aspect-square bg-cover rounded-lg size-8 border border-slate-200 dark:border-slate-700"
                                             data-alt="Band logo placeholder"
                                             style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAXkG8h130HowRVlLA_YVrQJi4iF3IfyD8i5OLNrPCHeE3Ft3GH6_6nlsd3EvaCwpuU3OSdYUHe0q4vR75Thg49T8ceFNTpMZg_ITz0_Si7Hduek6fhjdj9LBQemkwfUWUg2UhsoiZ5MvX478ezAAOADPv-cXCaShf-xhexLXDEjkf2CTNmkwefrmyodd5CPZvwPF2QFoS5ePV7GwhE_wTL9KKIfGhV3-7T3rokHuEbcXr0f4lrY7Eun6Cjfe8ubTVERSvX9102Hyk");'></div>

                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="flex justify-end mt-10 pt-6 border-t border-slate-200 dark:border-slate-800">
                    <button type="submit" class="flex min-w-[120px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-12 px-8 bg-primary hover:bg-primary/90 transition-colors text-white text-base font-bold leading-normal tracking-wide shadow-md">
                        Create Album
                    </button>
                </div>
                </form>
            </div>
        </main>
    </div>
</section>
