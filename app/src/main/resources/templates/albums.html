<!DOCTYPE html>
<html class="dark" lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SoundHub - Album Directory</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
          rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1978e5",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111821",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        body {
            scroll-behavior: smooth;
        }

        .glass-header {
            background: rgba(17, 24, 33, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>
<th:block th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
    <section
            class="font-display antialiased bg-background-light dark:bg-background-dark text-gray-900 dark:text-white pb-24">
        <main class="pt-24 pb-12">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8"
                 th:with="currentSort=${param.sort != null ? param.sort[0] : 'releaseDate'}">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-10">
                    <div>
                        <h1 class="text-3xl font-bold text-gray-900 dark:text-white" th:text="#{albums.directory}">
                            Albums Directory</h1>
                        <p class="text-gray-500 dark:text-gray-400 mt-2" th:text="#{albums.explore}">Explore the latest
                            and greatest releases.</p>
                    </div>
                    <div class="relative group w-max flex items-center gap-2">
                        <a th:href="@{/albums/add}" sec:authorize="hasAuthority('ADMIN') or hasAuthority('MODERATOR')"
                           class="flex items-center gap-2 px-4 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full text-sm font-medium text-gray-700 dark:text-gray-200 hover:border-primary/50 dark:hover:border-primary/50 hover:shadow-sm transition-all active:scale-95">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-primary/80" viewBox="0 0 24 24"
                                 fill="none"
                                 stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                                 stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"/>
                                <line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                            <span th:text="#{albums.add}">Add Album</span>
                        </a>
                        <button class="flex items-center gap-2 px-4 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg text-sm font-medium text-gray-700 dark:text-gray-200 hover:border-primary dark:hover:border-primary transition-colors">
                            <i class="fa-solid fa-arrow-down-short-wide"></i>
                            <p th:if="${currentSort == 'releaseDate'}" th:text="#{albums.recent}">Recent</p>
                            <p th:if="${currentSort == 'title'}">A-Z</p>
                            <i class="fa-solid fa-chevron-down text-[10px] ml-1"></i>
                        </button>
                        <div class="absolute right-0 mt-2 w-40 bg-white dark:bg-gray-800 border border-gray-100 dark:border-white/10 rounded-lg shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all py-1 z-10">
                            <a class="flex items-center justify-between px-4 py-2 text-sm"
                               th:classappend="${currentSort == 'releaseDate'} ? 'text-primary bg-primary/10'"
                               th:href="@{/albums(page = 0,
                                                  sort='releaseDate',
                                                  direction='desc')}">
                                Recent
                                <i class="fa-solid fa-check text-xs" th:if="${param.sort == 'releaseDate'}"></i>
                            </a>
                            <a class="flex items-center justify-between px-4 py-2 text-sm"
                               th:classappend="${currentSort == 'title'} ? 'text-primary bg-primary/10'"
                               th:href="@{/albums(page=0,
                                                  sort='title',
                                                  direction='asc')}">
                                A - Z
                                <i class="fa-solid fa-check text-xs" th:if="${param.sort == 'title'}"></i>
                            </a>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-x-6 gap-y-10">
                    <div class="flex flex-col group cursor-pointer"
                         th:each="album: ${albums}">
                        <div class="relative w-full aspect-square mb-4 overflow-hidden rounded-lg shadow-md
                                    transition-all duration-300
                                    group-hover:shadow-xl group-hover:-translate-y-1">
                            <a th:href="@{/albums/preview(id=${album.id})}"
                               class="block w-full h-full">
                                <img alt="Album Cover"
                                     class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
                                     th:src="${album.pictureUrl}"/>
                            </a>
                            <div class="absolute inset-0 bg-black/50 opacity-0
                                group-hover:opacity-100
                                transition-opacity duration-300
                                flex items-center justify-center gap-2
                                z-10 pointer-events-none"
                                 sec:authorize="hasAuthority('ADMIN') or hasAuthority('MODERATOR')">

                                <a th:href="@{/albums/update(id=${album.id})}"
                                   class="px-3 py-2 rounded-xl text-xs font-semibold
                                   bg-white/15 hover:bg-blue-500/80
                                   text-white border border-white/20
                                   hover:border-blue-400
                                   backdrop-blur-sm transition-all
                                   pointer-events-auto" th:text="#{albums.edit}">
                                    Edit
                                </a>

                                <a th:href="@{/albums/delete(id=${album.id})}"
                                   class="px-3 py-2 rounded-xl text-xs font-semibold
                                   bg-white/15 hover:bg-red-500/80
                                   text-white border border-white/20
                                   hover:border-red-400
                                   backdrop-blur-sm transition-all
                                   pointer-events-auto" th:text="#{albums.delete}">
                                    Delete
                                </a>
                            </div>
                        </div>
                        <a th:href="@{/albums/preview(id=${album.id})}">
                            <h3 class="font-bold text-gray-900 dark:text-white truncate w-full
                   group-hover:text-primary transition-colors"
                                th:text="${album.title}">
                            </h3>
                        </a>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1 truncate w-full"
                           th:text="${album.artist?.nickname}"></p>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1 truncate w-full"
                           th:text="${album.band?.name}"></p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <a th:href="@{/albums(
                    page=${albums.number}-1,
                    sort=${currentSort},
                    direction=${param.direction}
                    )}">
                        <button class="px-3 py-1 rounded border border-border-dark text-text-muted hover:bg-background-dark hover:text-slate-100 disabled:opacity-50 disabled:cursor-not-allowed"
                                th:disabled="${!albums.hasPrevious()}" th:text="#{albums.previous}">
                            Previous
                        </button>
                    </a>
                    <a th:href="@{/albums(
                    page=${albums.number}+1,
                    sort=${currentSort},
                    direction=${param.direction}
                    )}">
                        <button class="px-3 py-1 rounded border border-border-dark text-text-muted hover:bg-background-dark hover:text-slate-100 disabled:opacity-50 disabled:cursor-not-allowed"
                                th:disabled="${!albums.hasNext()}" th:text="#{albums.next}">
                            Next
                        </button>
                    </a>
                </div>
            </div>
        </main>
    </section>
</th:block>
</body>
</html>
