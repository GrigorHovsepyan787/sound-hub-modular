<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
  <title th:text="${artist.name} + ' - SoundHub'"></title>
</head>
<body>
<section>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#60a5fa",
            "on-primary": "#ffffff",
            surface: "#0f172a",
            "on-surface": "#f1f5f9",
            "surface-variant": "#1e293b",
            "on-surface-variant": "#94a3b8",
            outline: "#334155"
          },
          fontFamily: {
            "headline": ["Inter"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>

  <main class="pt-24 pb-20 px-6 max-w-screen-xl mx-auto">
    <section class="grid grid-cols-1 md:grid-cols-12 gap-6 mb-12">
      <div class="md:col-span-5 lg:col-span-4 h-[400px] md:h-[500px] relative rounded-lg overflow-hidden group">
        <img th:alt="${artist.name}"
             class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
             th:src="${artist.pictureUrl}"/>
        <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/20 to-transparent"></div>
        <div class="absolute bottom-8 left-8">
          <h1 class="text-5xl font-black tracking-tighter text-white"
              th:text="${artist.nickname != null and !artist.nickname.isEmpty()} ? ${artist.nickname} : ${artist.name} + '  ' + ${artist.surname}"></h1>
        </div>
      </div>
      <div class="md:col-span-7 lg:col-span-8 flex flex-col gap-6">
        <div class="glass-card p-8 rounded-lg flex-1">
          <div class="flex flex-col h-full justify-between">
            <div>
              <h2 class="text-blue-400 font-bold uppercase tracking-widest text-xs mb-4" th:text="#{artist.biography}">Biography</h2>
              <p class="text-xl leading-relaxed text-slate-300 font-light" th:text="${artist.bio}"></p>
            </div>
            <div class="mt-8"
                 th:if="${artist.bands != null and !#lists.isEmpty(artist.bands)}">
              <h2 class="text-blue-400 font-bold uppercase tracking-widest text-xs mb-4" th:text="#{artist.bands}">Bands</h2>
              <div class="flex flex-wrap gap-3">
                <a th:each="band : ${artist.bands}"
                   th:href="@{/bands/preview(id=${band.id})}"
                   class="flex items-center gap-2 bg-slate-800/50 border border-slate-700 px-4 py-2 rounded-full hover:bg-slate-700 transition-colors cursor-pointer no-underline">
                  <span class="material-symbols-outlined text-blue-400 text-sm">group</span>
                  <span class="text-sm font-medium text-slate-200" th:text="${band.name}"/>
                </a>
              </div>
            </div>
          </div>
        </div>
        <div class="grid grid-cols-3 gap-4">
          <div class="glass-card p-4 rounded-lg text-center border border-white/5 hover:border-white/20 transition-colors">
            <div class="text-2xl font-bold text-white tracking-tight">-</div>
            <div class="text-[10px] text-slate-400 uppercase tracking-widest mt-1">Playlist Adds</div>
          </div>
          <div class="glass-card p-4 rounded-lg text-center border border-white/5 hover:border-white/20 transition-colors">
            <div class="text-2xl font-bold text-white tracking-tight">-</div>
            <div class="text-[10px] text-slate-400 uppercase tracking-widest mt-1">Releases</div>
          </div>
          <div class="glass-card p-4 rounded-lg text-center border border-white/5 hover:border-white/20 transition-colors">
            <div class="text-2xl font-bold text-white tracking-tight">-</div>
            <div class="text-[10px] text-slate-400 uppercase tracking-widest mt-1">Total Likes</div>
          </div>
        </div>
      </div>
    </section>

    <section class="mt-16">
      <div class="flex items-center justify-between mb-8">
        <h2 class="text-2xl font-bold tracking-tight flex items-center gap-3">
          <span class="material-symbols-outlined text-blue-500">trending_up</span>
          <span th:text="#{artist.tracks.title}">Popular Tracks</span>
        </h2>
      </div>
      <div class="glass-card rounded-lg p-16 border-dashed border-2 border-slate-700/50 flex flex-col items-center justify-center text-center">
        <div class="w-24 h-24 bg-slate-800 rounded-full flex items-center justify-center mb-6 relative">
          <span class="material-symbols-outlined text-slate-600 text-5xl">music_note</span>
          <div class="absolute -top-1 -right-1 w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center border-4 border-slate-900">
            <span class="material-symbols-outlined text-white text-sm">priority_high</span>
          </div>
        </div>
        <h3 class="text-xl font-bold text-white mb-2" th:text="#{artist.tracks.empty}">No popular tracks available yet</h3>
      </div>
    </section>
  </main>

</section>
</body>
</html>
