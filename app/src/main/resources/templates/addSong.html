<!DOCTYPE html>

<html class="dark" lang="en"><head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>SoundHub Add New Track</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",

        extend: {
          colors: {
            "primary": "#1978e5",
            "background-light": "#f6f7f8",
            "background-dark": "#111821",

            "surface-darker": "#0f172a",
            "border-dark": "#334155"
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
          borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
        },
      },
    }

</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen antialiased selection:bg-primary/30">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
  <div class="layout-container flex h-full grow flex-col">
    <header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-border-dark px-10 py-3 bg-surface-darker sticky top-0 z-50">
      <div class="flex items-center gap-8">
        <div class="flex items-center gap-4 text-primary">
          <div class="size-6 flex items-center justify-center">
            <span class="material-symbols-outlined text-2xl">graphic_eq</span>
          </div>
          <h2 class="text-slate-100 text-xl font-bold leading-tight tracking-tight">SoundHub</h2>
        </div>
        <label class="flex flex-col min-w-40 !h-10 max-w-64">
          <div class="flex w-full flex-1 items-stretch rounded-full h-full bg-surface-dark border border-border-dark focus-within:border-primary transition-colors">
            <div class="text-slate-400 flex items-center justify-center pl-4 rounded-l-full">
              <span class="material-symbols-outlined text-xl">search</span>
            </div>
            <input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden text-slate-100 focus:outline-0 focus:ring-0 border-none bg-transparent h-full placeholder:text-slate-400 px-3 rounded-r-full text-sm font-medium" placeholder="Search" value=""/>
          </div>
        </label>
      </div>
      <div class="flex flex-1 justify-end gap-8 items-center">
        <nav class="flex items-center gap-9">
          <a class="text-slate-300 hover:text-primary transition-colors text-sm font-semibold leading-normal" href="#">Discover</a>
          <a class="text-slate-300 hover:text-primary transition-colors text-sm font-semibold leading-normal" href="#">Library</a>
          <a class="text-primary text-sm font-semibold leading-normal" href="#">Upload</a>
        </nav>
        <div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10 border-2 border-primary/20" data-alt="User profile avatar image" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAShq04QBkOg1OqpfRIPsMNswMHinHal_ekkUVM9lty0sjBPRfbLdUvd_JCu8wl32qG_0O82O4jBHl2vqumkHOTA2QOlO0kucpRcssHhfNxDrq35iwaJp8hO6JI0IfpLyiUz0fOdqhc6zte6fxoFVJ9YWhgvDBQRYTXqmtOZjCj0VPy8dGZJla2y8f3P7oXVDRPNtdRWUqdlwUCfJmcdR8Kr7jQng4JGRWbhNO_sJS97k5Vuu-EB8fw8TnBsjjPDMVpV6NJvcBhhdQ');"></div>
      </div>
    </header>
    <main class="flex flex-1 justify-center py-8 px-4 sm:px-8 lg:px-12">
      <div class="layout-content-container flex flex-col max-w-5xl flex-1 gap-8">
        <div>
          <h1 class="text-slate-100 tracking-tight text-3xl font-bold leading-tight mb-2">Add New Track</h1>
          <p class="text-slate-400 text-sm">Fill in the details below to publish a new track to SoundHub.</p>
        </div>
        <div class="bg-surface-dark border border-border-dark rounded-xl p-6 shadow-sm">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <label class="flex flex-col">
              <span class="text-slate-300 text-sm font-semibold mb-2">Track Title</span>
              <input class="form-input flex w-full resize-none overflow-hidden rounded-lg text-slate-100 focus:ring-2 focus:ring-primary/50 focus:border-primary border border-border-dark bg-surface-darker h-12 placeholder:text-slate-500 px-4 text-base font-medium transition-all" placeholder="Enter track title" value=""/>
            </label>
            <label class="flex flex-col">
              <span class="text-slate-300 text-sm font-semibold mb-2">Genre</span>
              <select class="form-select flex w-full resize-none overflow-hidden rounded-lg text-slate-100 focus:ring-2 focus:ring-primary/50 focus:border-primary border border-border-dark bg-surface-darker h-12 placeholder:text-slate-500 px-4 text-base font-medium transition-all cursor-pointer">
                <option disabled="" selected="" value="">Select genre</option>
                <option value="electronic">Electronic</option>
                <option value="rock">Rock</option>
                <option value="pop">Pop</option>
                <option value="hiphop">Hip Hop</option>
                <option value="jazz">Jazz</option>
                <option value="classical">Classical</option>
              </select>
            </label>
          </div>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
          <!-- Bands Column -->
          <div class="flex flex-col bg-surface-dark border border-border-dark rounded-xl overflow-hidden h-[500px]">
            <div class="p-4 border-b border-border-dark bg-surface-darker/50">
              <div class="flex items-center gap-2 mb-4">
                <span class="material-symbols-outlined text-primary">groups</span>
                <h2 class="text-slate-100 text-lg font-bold">Bands</h2>
              </div>
              <div class="relative">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">search</span>
                <input class="w-full bg-surface-darker border border-border-dark rounded-lg pl-9 pr-3 py-2 text-sm text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary placeholder-slate-500" placeholder="Search bands..." type="text"/>
              </div>
            </div>
            <div class="flex-1 overflow-y-auto p-2 custom-scrollbar">
              <label class="flex items-center gap-3 p-3 hover:bg-surface-darker rounded-lg cursor-pointer transition-colors group">
                <input class="form-checkbox text-primary rounded border-slate-600 bg-transparent focus:ring-primary focus:ring-offset-surface-dark" type="checkbox"/>
                <div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary group-hover:bg-primary/20 transition-colors">
                  <span class="material-symbols-outlined text-sm">music_note</span>
                </div>
                <span class="text-slate-300 group-hover:text-slate-100 font-medium text-sm">The Midnight</span>
              </label>
              <label class="flex items-center gap-3 p-3 hover:bg-surface-darker rounded-lg cursor-pointer transition-colors group">
                <input class="form-checkbox text-primary rounded border-slate-600 bg-transparent focus:ring-primary focus:ring-offset-surface-dark" type="checkbox"/>
                <div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary group-hover:bg-primary/20 transition-colors">
                  <span class="material-symbols-outlined text-sm">music_note</span>
                </div>
                <span class="text-slate-300 group-hover:text-slate-100 font-medium text-sm">Gunship</span>
              </label>
              <label class="flex items-center gap-3 p-3 hover:bg-surface-darker rounded-lg cursor-pointer transition-colors group">
                <input class="form-checkbox text-primary rounded border-slate-600 bg-transparent focus:ring-primary focus:ring-offset-surface-dark" type="checkbox"/>
                <div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary group-hover:bg-primary/20 transition-colors">
                  <span class="material-symbols-outlined text-sm">music_note</span>
                </div>
                <span class="text-slate-300 group-hover:text-slate-100 font-medium text-sm">Timecop1983</span>
              </label>
              <label class="flex items-center gap-3 p-3 hover:bg-surface-darker rounded-lg cursor-pointer transition-colors group">
                <input class="form-checkbox text-primary rounded border-slate-600 bg-transparent focus:ring-primary focus:ring-offset-surface-dark" type="checkbox"/>
                <div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary group-hover:bg-primary/20 transition-colors">
                  <span class="material-symbols-outlined text-sm">music_note</span>
                </div>
                <span class="text-slate-300 group-hover:text-slate-100 font-medium text-sm">FM-84</span>
              </label>
            </div>
          </div>
          <!-- Artists Column -->
          <div class="flex flex-col bg-surface-dark border border-border-dark rounded-xl overflow-hidden h-[500px]">
            <div class="p-4 border-b border-border-dark bg-surface-darker/50">
              <div class="flex items-center gap-2 mb-4">
                <span class="material-symbols-outlined text-primary">person</span>
                <h2 class="text-slate-100 text-lg font-bold">Artists</h2>
              </div>
              <div class="relative">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">search</span>
                <input class="w-full bg-surface-darker border border-border-dark rounded-lg pl-9 pr-3 py-2 text-sm text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary placeholder-slate-500" placeholder="Search artists..." type="text"/>
              </div>
            </div>
            <div class="flex-1 overflow-y-auto p-2 custom-scrollbar">
              <label class="flex items-center gap-3 p-3 hover:bg-surface-darker rounded-lg cursor-pointer transition-colors group">
                <input class="form-checkbox text-primary rounded border-slate-600 bg-transparent focus:ring-primary focus:ring-offset-surface-dark" type="checkbox"/>
                <div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary group-hover:bg-primary/20 transition-colors">
                  <span class="material-symbols-outlined text-sm">mic</span>
                </div>
                <span class="text-slate-300 group-hover:text-slate-100 font-medium text-sm">Tyler Lyle</span>
              </label>
              <label class="flex items-center gap-3 p-3 hover:bg-surface-darker rounded-lg cursor-pointer transition-colors group">
                <input class="form-checkbox text-primary rounded border-slate-600 bg-transparent focus:ring-primary focus:ring-offset-surface-dark" type="checkbox"/>
                <div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary group-hover:bg-primary/20 transition-colors">
                  <span class="material-symbols-outlined text-sm">mic</span>
                </div>
                <span class="text-slate-300 group-hover:text-slate-100 font-medium text-sm">Tim McEwan</span>
              </label>
              <label class="flex items-center gap-3 p-3 hover:bg-surface-darker rounded-lg cursor-pointer transition-colors group">
                <input class="form-checkbox text-primary rounded border-slate-600 bg-transparent focus:ring-primary focus:ring-offset-surface-dark" type="checkbox"/>
                <div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary group-hover:bg-primary/20 transition-colors">
                  <span class="material-symbols-outlined text-sm">mic</span>
                </div>
                <span class="text-slate-300 group-hover:text-slate-100 font-medium text-sm">Ollie Wride</span>
              </label>
            </div>
          </div>
          <!-- Albums Column -->
          <div class="flex flex-col bg-surface-dark border border-border-dark rounded-xl overflow-hidden h-[500px]">
            <div class="p-4 border-b border-border-dark bg-surface-darker/50">
              <div class="flex items-center gap-2 mb-4">
                <span class="material-symbols-outlined text-primary">album</span>
                <h2 class="text-slate-100 text-lg font-bold">Albums</h2>
              </div>
              <div class="relative">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">search</span>
                <input class="w-full bg-surface-darker border border-border-dark rounded-lg pl-9 pr-3 py-2 text-sm text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary placeholder-slate-500" placeholder="Search albums..." type="text"/>
              </div>
            </div>
            <div class="flex-1 overflow-y-auto p-2 custom-scrollbar">
              <label class="flex items-center gap-3 p-3 hover:bg-surface-darker rounded-lg cursor-pointer transition-colors group">
                <input class="form-radio text-primary border-slate-600 bg-transparent focus:ring-primary focus:ring-offset-surface-dark" name="album_selection" type="radio"/>
                <div class="w-10 h-10 rounded bg-surface-darker border border-border-dark flex items-center justify-center text-slate-500 overflow-hidden">
                  <span class="material-symbols-outlined text-lg">image</span>
                </div>
                <div class="flex flex-col">
                  <span class="text-slate-200 group-hover:text-slate-100 font-medium text-sm">Endless Summer</span>
                  <span class="text-slate-500 text-xs">2016</span>
                </div>
              </label>
              <label class="flex items-center gap-3 p-3 hover:bg-surface-darker rounded-lg cursor-pointer transition-colors group">
                <input class="form-radio text-primary border-slate-600 bg-transparent focus:ring-primary focus:ring-offset-surface-dark" name="album_selection" type="radio"/>
                <div class="w-10 h-10 rounded bg-surface-darker border border-border-dark flex items-center justify-center text-slate-500 overflow-hidden">
                  <span class="material-symbols-outlined text-lg">image</span>
                </div>
                <div class="flex flex-col">
                  <span class="text-slate-200 group-hover:text-slate-100 font-medium text-sm">Days of Thunder</span>
                  <span class="text-slate-500 text-xs">2014</span>
                </div>
              </label>
              <label class="flex items-center gap-3 p-3 hover:bg-surface-darker rounded-lg cursor-pointer transition-colors group">
                <input class="form-radio text-primary border-slate-600 bg-transparent focus:ring-primary focus:ring-offset-surface-dark" name="album_selection" type="radio"/>
                <div class="w-10 h-10 rounded bg-surface-darker border border-border-dark flex items-center justify-center text-slate-500 overflow-hidden">
                  <span class="material-symbols-outlined text-lg">image</span>
                </div>
                <div class="flex flex-col">
                  <span class="text-slate-200 group-hover:text-slate-100 font-medium text-sm">Nocturnal</span>
                  <span class="text-slate-500 text-xs">2017</span>
                </div>
              </label>
            </div>
          </div>
        </div>
        <div class="flex justify-end gap-4 mt-4 pt-6 border-t border-border-dark">
          <button class="px-6 py-3 rounded-lg text-slate-300 font-semibold hover:bg-surface-dark transition-colors text-sm">
            Cancel
          </button>
          <button class="px-8 py-3 rounded-lg bg-primary hover:bg-primary/90 text-white font-bold transition-colors shadow-lg shadow-primary/20 flex items-center gap-2 text-sm">
            <span class="material-symbols-outlined text-sm">add_circle</span>
            Add Track
          </button>
        </div>
      </div>
    </main>
  </div>
</div>
<style>
  .custom-scrollbar::-webkit-scrollbar {
    width: 6px;
  }
  .custom-scrollbar::-webkit-scrollbar-track {
    background: transparent;
  }
  .custom-scrollbar::-webkit-scrollbar-thumb {
    background-color: theme('colors.border-dark');
    border-radius: 20px;
  }
</style>
</body></html>
