<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Create Playlist - SoundHub</title>
</head>

<body>
<section
        class="font-display antialiased bg-background-light dark:bg-background-dark text-gray-900 dark:text-white pb-24">

    <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 py-10">

        <div class="mb-8">
            <h1 class="text-3xl md:text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-500 dark:from-white dark:to-gray-500">
                Create New Playlist
            </h1>
            <p class="text-slate-500 dark:text-gray-400 mt-2">
                Curate your perfect collection of tracks.
            </p>
        </div>

        <form th:action="@{/playlists}" method="post" enctype="multipart/form-data">
            <div class="flex flex-col lg:flex-row gap-8 lg:gap-12">

                <div class="w-full lg:w-1/3 flex flex-col gap-6">
                    <div class="bg-white dark:bg-brand-surface/50 border border-slate-200 dark:border-white/5 rounded-2xl p-6 shadow-sm dark:shadow-xl">

                        <div class="flex flex-col gap-3 mb-6">
                            <label for="playlistImage"
                                   class="text-sm font-semibold text-slate-700 dark:text-gray-300">
                                Playlist Cover
                            </label>

                            <div id="uploadBox"
                                 class="relative w-full aspect-video md:aspect-[21/9] bg-brand-surface rounded-xl border-2 border-dashed border-gray-700 flex flex-col items-center justify-center cursor-pointer hover:border-primary transition-all group overflow-hidden">

                                <img id="previewImage"
                                     class="absolute inset-0 w-full h-full object-cover rounded-xl hidden z-0"/>

                                <div id="uploadInner" class="flex flex-col items-center justify-center gap-3 p-6 z-10">
                                    <div class="p-3 bg-gray-700 rounded-full text-gray-300 group-hover:text-primary group-hover:bg-primary/10 transition-colors">
                                        <i class="fa-solid fa-cloud-arrow-up text-2xl"></i>
                                    </div>
                                    <div class="text-center">
                                        <p class="text-base font-bold">Click to upload photo</p>
                                    </div>
                                </div>

                                <input id="playlistImage"
                                       name="playlistImage"
                                       accept="image/*"
                                       type="file"
                                       class="hidden"/>
                            </div>
                        </div>

                        <div class="flex flex-col gap-2 mb-6">
                            <label for="playlistName"
                                   class="text-sm font-semibold text-slate-700 dark:text-gray-300">
                                Playlist Name
                            </label>
                            <input id="playlistName"
                                   name="name"
                                   type="text"
                                   required
                                   placeholder="Enter playlist name"
                                   class="form-input w-full rounded-xl bg-brand-surface border border-gray-700 focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 placeholder:text-gray-500 text-base font-medium transition-colors"/>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700 dark:text-gray-300 mb-3">
                                Visibility
                            </label>

                            <div class="flex gap-4">
                                <button type="button"
                                        id="btnPublic"
                                        onclick="setVisibility(true)"
                                        class="vis-btn flex-1 flex items-center justify-center gap-2 p-3 rounded-lg border border-slate-200 dark:border-white/10 hover:border-green-500 hover:text-green-400 transition-all">
                                    <i class="fa-solid fa-earth-americas"></i>
                                    <span>Public</span>
                                </button>

                                <button type="button"
                                        id="btnPrivate"
                                        onclick="setVisibility(false)"
                                        class="vis-btn flex-1 flex items-center justify-center gap-2 p-3 rounded-lg border border-slate-200 dark:border-white/10 hover:border-red-500 hover:text-red-400 transition-all">
                                    <i class="fa-solid fa-lock"></i>
                                    <span>Private</span>
                                </button>
                            </div>

                            <input type="hidden" id="publicFlagInput" name="publicFlag" value="false"/>
                        </div>

                    </div>
                </div>

                <div class="flex flex-col flex-1 border border-slate-200 dark:border-slate-800 rounded-xl overflow-hidden bg-white dark:bg-slate-800/50">

                    <div class="p-4 border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800">
                        <p class="text-slate-900 dark:text-slate-100 text-base font-bold leading-normal pb-3">
                            Select Songs
                        </p>

                        <div class="flex w-full items-stretch rounded-lg h-9 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700">
                            <div class="text-slate-400 flex items-center justify-center pl-3">
                                <span class="material-symbols-outlined text-[20px]">⌕</span>
                            </div>
                            <input id="songSearch"
                                   class="form-input flex w-full min-w-0 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-0 border-none bg-transparent h-full placeholder:text-slate-400 px-3 text-sm"
                                   placeholder="Search all songs by title..."/>
                        </div>
                    </div>

                    <div id="songList" class="flex flex-col overflow-y-auto max-h-[420px] p-2"></div>

                    <p id="noResults"
                       class="hidden text-center text-slate-400 text-sm py-8 px-4">No songs found.</p>

                    <p id="loadingIndicator"
                       class="hidden text-center text-slate-400 text-sm py-8">Searching...</p>

                    <div id="hiddenSongInputs"></div>

                    <div class="p-4 border-t border-slate-200 dark:border-white/5 flex items-center justify-between">
                        <p id="selectedCount" class="text-sm font-semibold text-primary hidden">0 selected</p>
                    </div>

                </div>
            </div>

            <div class="flex items-center justify-end gap-4 mt-8 pt-8 border-t border-slate-800/60">
                <a th:href="@{/playlists}"
                   class="px-6 py-3 rounded-xl text-slate-400 font-semibold text-sm tracking-wide
              hover:text-slate-100 hover:bg-white/5 transition-all duration-300
              active:scale-95">
                    Cancel
                </a>

                <button type="submit"
                        class="group relative px-10 py-3.5 rounded-xl bg-violet-600 overflow-hidden
                   transition-all duration-300 hover:bg-violet-500 hover:shadow-[0_0_20px_rgba(139,92,246,0.4)]
                   active:scale-95 flex items-center gap-3">

                    <div class="absolute inset-0 bg-gradient-to-tr from-white/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>

                    <span class="relative text-white font-bold text-sm tracking-tight">
                        Create Playlist
                    </span>
                    <svg xmlns="http://www.w3.org/2000/svg"
                         class="relative h-4 w-4 text-white transform group-hover:translate-x-1 transition-transform duration-300"
                         fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                    </svg>
                </button>
            </div>

        </form>
    </div>

    <script>
        const uploadBox = document.getElementById('uploadBox');
        const fileInput = document.getElementById('playlistImage');
        const previewImage = document.getElementById('previewImage');
        const uploadInner = document.getElementById('uploadInner');

        uploadBox.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', () => {
            const file = fileInput.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                previewImage.src = e.target.result;
                previewImage.classList.remove('hidden');
                uploadInner.classList.add('opacity-0');
            };
            reader.readAsDataURL(file);
        });

        const btnPublic = document.getElementById('btnPublic');
        const btnPrivate = document.getElementById('btnPrivate');
        const publicFlagInput = document.getElementById('publicFlagInput');

        applyVisualState(false);

        function setVisibility(isPublic) {
            publicFlagInput.value = isPublic;
            applyVisualState(isPublic);
        }

        function applyVisualState(isPublic) {
            btnPublic.className = 'vis-btn flex-1 flex items-center justify-center gap-2 p-3 rounded-lg border transition-all';
            btnPrivate.className = 'vis-btn flex-1 flex items-center justify-center gap-2 p-3 rounded-lg border transition-all';
            if (isPublic) {
                btnPublic.classList.add('border-green-500', 'text-green-400', 'bg-green-500/10');
                btnPrivate.classList.add('border-white/10', 'text-gray-400');
            } else {
                btnPrivate.classList.add('border-red-500', 'text-red-400', 'bg-red-500/10');
                btnPublic.classList.add('border-white/10', 'text-gray-400');
            }
        }

        const songSearch = document.getElementById('songSearch');
        const songList = document.getElementById('songList');
        const noResults = document.getElementById('noResults');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const hiddenInputs = document.getElementById('hiddenSongInputs');
        const selectedCount = document.getElementById('selectedCount');
        const listLabel = document.getElementById('listLabel');

        const DEFAULT_IMG = 'https://soundhub7.s3.eu-north-1.amazonaws.com/assets/PlaylistDefault.png';

        const checkedIds = new Set();

        function updateSelectedCount() {
            if (checkedIds.size === 0) {
                selectedCount.classList.add('hidden');
            } else {
                selectedCount.classList.remove('hidden');
                selectedCount.textContent = checkedIds.size + ' selected';
            }
        }

        function rebuildHiddenInputs() {
            hiddenInputs.innerHTML = '';
            checkedIds.forEach(id => {
                const inp = document.createElement('input');
                inp.type = 'hidden';
                inp.name = 'songIds';
                inp.value = id;
                hiddenInputs.appendChild(inp);
            });
        }

        function renderSongs(songs) {
            songList.innerHTML = '';
            noResults.classList.add('hidden');

            if (!songs || songs.length === 0) {
                noResults.classList.remove('hidden');
                return;
            }

            songs.forEach(song => {
                const isChecked = checkedIds.has(String(song.id));
                const performer = song.performer || song.bandName || song.artistNickname || song.artistFullName || '';
                const picture = song.pictureUrl || DEFAULT_IMG;
                const duration = song.durationFormatted || '';

                const label = document.createElement('label');
                label.className = 'song-row flex items-center gap-3 p-3 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-lg cursor-pointer transition-colors';
                label.innerHTML = `
                    <input class="song-checkbox form-checkbox rounded text-primary border-slate-300 dark:border-slate-600
                                  bg-white dark:bg-slate-900 focus:ring-primary size-5 flex-shrink-0"
                           type="checkbox" data-song-id="${song.id}" ${isChecked ? 'checked' : ''}/>
                    <div class="aspect-square w-10 rounded overflow-hidden border border-slate-200 dark:border-slate-700 flex-shrink-0">
                        <img src="${picture}" alt="cover" class="w-full h-full object-cover"
                             onerror="this.src='${DEFAULT_IMG}'"/>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-slate-800 dark:text-slate-200 text-sm font-semibold truncate">${song.title}</p>
                        <p class="text-slate-500 dark:text-slate-400 text-xs truncate">${performer}</p>
                    </div>
                    <span class="text-xs text-slate-400 flex-shrink-0">${duration}</span>
                `;

                label.querySelector('input[type="checkbox"]').addEventListener('change', function () {
                    const id = String(song.id);
                    if (this.checked) checkedIds.add(id);
                    else checkedIds.delete(id);
                    rebuildHiddenInputs();
                    updateSelectedCount();
                });

                songList.appendChild(label);
            });
        }

        function fetchSongs(url, label) {
            loadingIndicator.classList.remove('hidden');
            songList.innerHTML = '';
            noResults.classList.add('hidden');

            fetch(url)
                .then(res => res.ok ? res.json() : Promise.reject())
                .then(songs => {
                    loadingIndicator.classList.add('hidden');
                    renderSongs(songs);
                })
                .catch(() => {
                    loadingIndicator.classList.add('hidden');
                    noResults.textContent = 'Could not load songs.';
                    noResults.classList.remove('hidden');
                });
        }

        fetchSongs('/songs/search?q=&limit=10');

        let debounceTimer;
        songSearch.addEventListener('input', () => {
            const query = songSearch.value.trim();
            clearTimeout(debounceTimer);

            if (query.length === 0) {
                fetchSongs('/songs/search?q=&limit=10', 'Top 10 popular songs');
                return;
            }

            if (query.length < 2) return;

            debounceTimer = setTimeout(() => {
                fetchSongs(`/songs/search?q=${encodeURIComponent(query)}&limit=20`, 'Search results');
            }, 300);
        });
    </script>

</section>
</body>
</html>
