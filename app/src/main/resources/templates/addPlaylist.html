<main class="pt-24 pb-12 max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8">
  <div class="mb-8">
    <h1 class="text-3xl md:text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-500 dark:from-white dark:to-gray-500">Create New Playlist</h1>
    <p class="text-slate-500 dark:text-gray-400 mt-2">Curate your perfect collection of tracks.</p>
  </div>
  <div class="flex flex-col lg:flex-row gap-8 lg:gap-12">
    <div class="w-full lg:w-1/3 flex flex-col gap-6" data-purpose="playlist-details-form">
      <div class="bg-white dark:bg-brand-surface/50 border border-slate-200 dark:border-white/5 rounded-2xl p-6 shadow-sm dark:shadow-xl">
        <div class="mb-6 group cursor-pointer">
          <label class="block text-sm font-medium text-slate-700 dark:text-gray-300 mb-2 cursor-pointer">Playlist Cover</label>
          <div class="relative aspect-square w-full rounded-xl border-2 border-dashed border-slate-300 dark:border-white/10 bg-slate-50 dark:bg-black/20 hover:border-primary dark:hover:border-primary transition-colors flex flex-col items-center justify-center overflow-hidden">
            <div class="text-center p-6 flex flex-col items-center group-hover:scale-105 transition-transform">
              <i class="fa-solid fa-cloud-arrow-up text-4xl text-slate-400 dark:text-gray-500 mb-3 group-hover:text-primary transition-colors"></i>
              <span class="text-sm text-slate-500 dark:text-gray-400 font-medium">Click to upload</span>
              <span class="text-xs text-slate-400 dark:text-gray-500 mt-1">JPEG, PNG, max 5MB</span>
            </div>
            <input accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" type="file"/>
          </div>
        </div>
        <div class="mb-6">
          <label class="block text-sm font-medium text-slate-700 dark:text-gray-300 mb-2" for="playlist-name">Playlist Name <span class="text-red-500">*</span></label>
          <input class="w-full bg-slate-50 dark:bg-black/30 border border-slate-200 dark:border-white/10 rounded-lg px-4 py-3 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" id="playlist-name" placeholder="e.g., Late Night Vibes" required="" type="text"/>
        </div>
        <div class="mb-6">
          <label class="block text-sm font-medium text-slate-700 dark:text-gray-300 mb-2" for="playlist-desc">Description (Optional)</label>
          <textarea class="w-full bg-slate-50 dark:bg-black/30 border border-slate-200 dark:border-white/10 rounded-lg px-4 py-3 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all resize-none" id="playlist-desc" placeholder="What's the vibe?" rows="3"></textarea>
        </div>
        <div class="mb-2">
          <label class="block text-sm font-medium text-slate-700 dark:text-gray-300 mb-3">Visibility</label>
          <div class="flex gap-4">
            <label class="flex-1 cursor-pointer">
              <input class="peer sr-only" name="visibility" type="radio" value="public"/>
              <div class="flex items-center justify-center gap-2 p-3 rounded-lg border border-slate-200 dark:border-white/10 bg-slate-50 dark:bg-black/20 text-slate-500 dark:text-gray-400 peer-checked:bg-primary/10 peer-checked:border-primary peer-checked:text-primary transition-all">
                <i class="fa-solid fa-earth-americas"></i>
                <span class="text-sm font-medium">Public</span>
              </div>
            </label>
            <label class="flex-1 cursor-pointer">
              <input checked="" class="peer sr-only" name="visibility" type="radio" value="private"/>
              <div class="flex items-center justify-center gap-2 p-3 rounded-lg border border-slate-200 dark:border-white/10 bg-slate-50 dark:bg-black/20 text-slate-500 dark:text-gray-400 peer-checked:bg-primary/10 peer-checked:border-primary peer-checked:text-primary transition-all">
                <i class="fa-solid fa-lock"></i>
                <span class="text-sm font-medium">Private</span>
              </div>
            </label>
          </div>
        </div>
      </div>
    </div>
