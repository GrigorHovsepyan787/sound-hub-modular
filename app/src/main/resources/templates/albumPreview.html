<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>SoundHub - Album View</title>
</head>
<body>
<section
        class="font-display antialiased bg-background-light dark:bg-background-dark text-gray-900 dark:text-white pb-24">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
          rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1978e5",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111821",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>

    <main class="pt-24 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex flex-col md:flex-row gap-8 mb-12" data-purpose="album-header">
            <div class="flex-shrink-0">
                <img alt="Album Cover" class="w-64 h-64 md:w-80 md:h-80 object-cover rounded-xl shadow-2xl"
                     th:src="${album.pictureUrl}"/>
            </div>
            <div class="flex flex-col justify-end pb-4">
                <p class="text-sm font-semibold uppercase tracking-widest text-gray-400 mb-2"
                   th:text="#{albumPreview.album}">Album</p>
                <h1 class="text-4xl md:text-6xl lg:text-7xl font-black text-white tracking-tighter mb-4"
                    th:text="${album.title}"></h1>
                <div class="flex items-center gap-2 text-sm md:text-base text-gray-300 mb-6 font-medium">
                    <img alt="Artist Avatar" class="w-8 h-8 rounded-full object-cover"
                         th:src="${album.artist?.pictureUrl ?: album.band?.pictureUrl}"/>
                    <a class="text-white hover:text-primary transition-colors font-bold"
                       th:href="@{/bands/preview(id=${album.band?.id})}" th:text="${album.band?.name}"></a>
                    <a class="text-white hover:text-primary transition-colors font-bold"
                       th:href="@{/artists/preview(id=${album.artist?.id})}"
                       th:text="${album.artist != null ? (#strings.isEmpty(album.artist.nickname) ? (album.artist.name + ' ' + album.artist.surname) : album.artist.nickname) : 'Unknown Artist'}"></a>
                    <span class="w-1.5 h-1.5 bg-gray-500 rounded-full mx-1"></span>
                    <span th:text="${album.releaseDate != null ? album.releaseDate.year : ''}"></span>
                    <span class="w-1.5 h-1.5 bg-gray-500 rounded-full mx-1"></span>
                    <span th:text="${album.songs.size()}"></span>
                    <span th:text="#{albumPreview.songs}"> songs</span>
                </div>
            </div>
        </div>

        <hr class="border-slate-800 mb-12"/>

        <div class="w-full">

            <div th:if="${songs == null or songs.isEmpty()}"
                 class="text-center text-gray-400 py-10">
                No songs in this album
            </div>

            <div th:if="${songs != null and !songs.isEmpty()}"
                 class="w-full max-w-5xl bg-slate-900/50 rounded-2xl border border-slate-800 overflow-hidden mb-12 shadow-sm mx-auto">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                        <tr class="border-b border-slate-800 bg-slate-800/50">
                            <th class="py-4 px-4"></th>
                            <th class="py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-400"
                                th:text="#{songs.table.title}">Title
                            </th>
                            <th class="py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-400 hidden md:table-cell"
                                th:text="#{songs.table.genre}">Genre
                            </th>
                            <th class="py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-400 text-right"
                                th:text="#{songs.table.duration}">Duration
                            </th>
                            <th class="py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-400 text-right"
                                th:text="#{songs.table.plays}">Play Count
                            </th>
                        </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-800">
                        <tr th:each="song, iterStat : ${songs}"
                            class="group hover:bg-white/5 transition-all cursor-pointer">

                            <td class="py-4 px-4">
                                <button type="button"
                                        th:data-id="${song.id}"
                                        th:data-title="${song.title}"
                                        th:data-performer="${song.performer}"
                                        th:data-url="${song.songUrl}"
                                        data-play-btn
                                        class="w-10 h-10 flex items-center justify-center rounded-full bg-transparent
                                               group-hover:bg-brand-accent group-hover:text-white transition-all text-slate-400">
                                    <i class="fa-solid fa-play text-sm ml-0.5"></i>
                                </button>
                            </td>

                            <td class="py-4 px-6">
                                <div class="flex items-center gap-3">
                                    <span class="text-xs font-bold text-slate-500 w-4"
                                          th:text="${iterStat.count}"></span>
                                    <span class="block font-semibold text-white" th:text="${song.title}"></span>
                                </div>
                            </td>

                            <td class="py-4 px-6 hidden md:table-cell">
                                <span
                                        class="px-2 py-1 text-[10px] font-bold uppercase tracking-widest bg-slate-800 text-slate-400 rounded-md"
                                        th:text="${song.genre}">
                                </span>
                            </td>

                            <td class="py-4 px-6 text-right font-mono text-sm text-slate-400"
                                th:text="${song.durationFormatted}"></td>

                            <td class="py-4 px-6 text-right">
                                <div class="flex items-center justify-end gap-1 text-slate-400">
                                    <i class="fa-solid fa-headphones text-sm"></i>
                                    <span class="text-sm font-mono" th:text="${song.playCount}"></span>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        (function () {
            const buttons = Array.from(document.querySelectorAll('[data-play-btn]'));
            const songs = buttons.map(btn => ({
                id: btn.dataset.id,
                title: btn.dataset.title,
                performer: btn.dataset.performer,
                url: btn.dataset.url,
            }));
            document.dispatchEvent(new CustomEvent('soundhub:register', {detail: {songs}}));

            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    document.dispatchEvent(new CustomEvent('soundhub:play', {
                        detail: {
                            id: btn.dataset.id,
                            title: btn.dataset.title,
                            performer: btn.dataset.performer,
                            url: btn.dataset.url,
                            songs: songs,
                        }
                    }));
                });
            });
        })();
    </script>
</section>
</body>
</html>
