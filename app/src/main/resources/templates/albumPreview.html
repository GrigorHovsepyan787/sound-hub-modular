<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SoundHub - Album View</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
          rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1978e5",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111821",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style data-purpose="layout-styles">
        body {
            scroll-behavior: smooth;
        }

        .glass-header {
            background: rgba(17, 24, 33, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-player {
            background: rgba(17, 24, 33, 0.9);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>
<th:block th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
    <section class="font-display antialiased bg-background-light dark:bg-background-dark text-gray-900 dark:text-white pb-24">
        <main class="pt-24 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row gap-8 mb-12" data-purpose="album-header">
                <div class="flex-shrink-0">
                    <img alt="Album Cover" class="w-64 h-64 md:w-80 md:h-80 object-cover rounded-xl shadow-2xl"
                         th:src="${album.pictureUrl}"/>
                </div>
                <div class="flex flex-col justify-end pb-4">
                    <p class="text-sm font-semibold uppercase tracking-widest text-gray-400 mb-2" th:text="#{albumPreview.album}">Album</p>
                    <h1 class="text-4xl md:text-6xl lg:text-7xl font-black text-white tracking-tighter mb-4" th:text="${album.title}"></h1>
                    <div class="flex items-center gap-2 text-sm md:text-base text-gray-300 mb-6 font-medium">
                        <img alt="Artist Avatar" class="w-8 h-8 rounded-full object-cover"
                             th:src="${album.artist?.pictureUrl ?: album.band?.pictureUrl}"/>
                        <a class="text-white hover:text-primary transition-colors font-bold" th:href="@{/bands/preview(id=${album.band?.id})}" th:text="${album.band?.name}"></a>
                        <a class="text-white hover:text-primary transition-colors font-bold" th:href="@{/artists/preview(id=${album.artist?.id})}" th:text="${album.artist?.name}"></a>
                        <span class="w-1.5 h-1.5 bg-gray-500 rounded-full mx-1"></span>
                        <span th:text="${album.releaseDate != null ? album.releaseDate.year : ''}"></span>
                        <span class="w-1.5 h-1.5 bg-gray-500 rounded-full mx-1"></span>
                        <span th:text="${album.songs.size()}">12</span><span th:text="#{albumPreview.songs}"> songs</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <button class="w-14 h-14 rounded-full bg-primary flex items-center justify-center text-white hover:scale-105 transition-transform shadow-lg shadow-primary/30">
                            <span class="material-symbols-outlined text-3xl">play_arrow</span>
                        </button>
                        <button class="w-12 h-12 rounded-full border border-gray-400 text-white flex items-center justify-center hover:border-white hover:bg-white/10 transition-colors">
                            <span class="material-symbols-outlined">favorite_border</span>
                        </button>
                    </div>
                </div>
            </div>
            <div class="space-y-8">
                <div data-purpose="album-tracks">
                    <div class="grid grid-cols-[40px_1fr_60px_60px] md:grid-cols-[60px_1fr_60px_80px] gap-4 px-4 py-2 border-b border-white/10 text-gray-400 text-xs uppercase tracking-wider font-semibold mb-2">
                        <span class="text-center">#</span>
                        <span th:text="#{albumPreview.title}">Title</span>
                        <span class="text-center"></span>
                        <span class="text-right flex justify-end"><span class="material-symbols-outlined text-sm">schedule</span></span>
                    </div>
                    <div class="space-y-1">
                        <div class="grid grid-cols-[40px_1fr_60px_60px] md:grid-cols-[60px_1fr_60px_80px] gap-4 px-4 py-3 rounded-lg items-center bg-white/10 text-primary group transition-colors cursor-pointer">
                            <div class="text-center flex justify-center items-center">
                                <span class="material-symbols-outlined text-primary text-xl">equalizer</span>
                            </div>
                            <div class="flex items-center gap-4 overflow-hidden">
                                <div class="truncate">
                                    <span class="font-bold text-primary block truncate">Midnight Echoes</span>
                                    <a class="text-xs text-primary/80 hover:underline" href="#">Elena Vox</a>
                                </div>
                            </div>
                            <div class="text-center opacity-100">
                                <button class="text-primary hover:text-white transition-colors">
                                    <span class="material-symbols-outlined text-[20px] fill-current">favorite</span>
                                </button>
                            </div>
                            <span class="text-right text-primary text-sm">3:42</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </section>
</th:block>
<script data-purpose="mobile-nav-toggle">
    const menuToggle = document.getElementById('mobile-menu-toggle');
    if (menuToggle) {
        menuToggle.addEventListener('click', () => {
            alert('Mobile menu navigation triggered.');
        });
    }
</script>
</body>
</html>
