<!DOCTYPE html>
<html class="dark" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SoundHub - Verify Your Account</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap"
          rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
          rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
          rel="stylesheet"/>
    <script id="tailwind-config">        tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#6366f1",
                    "background-light": "#f8f6f6",
                    "background-dark": "#0b0b0b",
                    "neutral-dark": "#181818",
                    "accent-purple": "#8b5cf6",
                },
                fontFamily: {
                    "display": ["Public Sans", "sans-serif"]
                },
                borderRadius: {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
                },
            },
        },
    }</script>
    <style>
        body {
            font-family: 'Public Sans', sans-serif;
            background-color: #0b0b0b;
        }
    </style>
</head>
<body>
<th:block th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
    <section
            class="bg-background-light min-h-screen flex items-center justify-center font-display antialiased transition-colors duration-300 dark:bg-black">
        <div class="fixed inset-0 z-0 opacity-40 dark:opacity-20 pointer-events-none">
            <div class="absolute inset-0 bg-gradient-to-br from-primary/30 via-transparent to-accent-purple/30"></div>
            <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/20 blur-[120px]"></div>
            <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-accent-purple/20 blur-[120px]"></div>
        </div>
        <div class="relative z-10 w-full max-w-md px-6 py-12">
            <div class="bg-white/80 dark:bg-neutral-dark/90 backdrop-blur-xl border border-slate-200 dark:border-primary/10 rounded-xl shadow-2xl p-8 md:p-10">
                <div class="flex flex-col items-center mb-8">
                    <div class="mb-4 p-3 bg-primary rounded-xl shadow-lg shadow-primary/30">
                        <span class="material-symbols-outlined text-white text-4xl">graphic_eq</span>
                    </div>
                    <h1 class="text-3xl font-bold text-slate-900 dark:text-slate-100 tracking-tight">SoundHub</h1>
                </div>
                <div class="mb-8">
                    <h2 class="text-2xl font-bold text-slate-900 dark:text-slate-100" th:text="#{verify.account}">Verify
                        your account</h2>
                    <p class="text-slate-500 dark:text-slate-400 text-sm mt-1" th:text="#{verify.expire}">The
                        verification code has been sent to your email, and it will expire in 15 minutes.</p>
                </div>
                <form class="space-y-5" th:action="@{/verify}" method="POST">
                    <input type="hidden" name="email" th:value="${email}">
                    <div>
                        <div class="flex justify-between items-center mb-1.5 ml-1">
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300"
                                   for="verificationCode" th:text="#{verify.code}">Code</label>
                        </div>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
                                <span class="material-symbols-outlined text-[20px]">numbers</span>
                            </div>
                            <input class="block w-full pl-11 pr-12 py-3.5 bg-slate-50 dark:bg-background-dark/50 border border-slate-200 dark:border-primary/20 rounded-xl text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                                   id="verificationCode" name="verificationCode" type="text"/>
                        </div>
                    </div>
                    <button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-xl shadow-lg shadow-primary/30 transform active:scale-[0.98] transition-all flex items-center justify-center gap-2 group"
                            type="submit">
                        <span th:text="#{verify.button}">Verify</span>
                    </button>
                </form>
            </div>
        </div>
    </section>
</th:block>
</body>
</html>
