<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
    <title th:text="#{artists.title} + ' - SoundHub'">Artists Directory - SoundHub</title>
</head>
<body>
<section>
    <main class="pt-24 pb-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-10">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900 dark:text-white" th:text="#{artists.title}">Artists Directory</h1>
                    <p class="text-gray-500 dark:text-gray-400 mt-2" th:text="#{artists.subtitle}">Discover and connect with your favorite creators.</p>
                </div>

                <div class="flex items-center gap-3">

                    <a th:href="@{/artists/add}"
                       class="flex items-center gap-2 px-4 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full text-sm font-medium text-gray-700 dark:text-gray-200 hover:border-primary/50 dark:hover:border-primary/50 hover:shadow-sm transition-all active:scale-95">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-primary/80" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                        <span th:text="#{artists.add}">Add Artist</span>
                    </a>

                    <div class="relative group w-max">
                        <button class="flex items-center gap-2 px-4 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full text-sm font-medium text-gray-700 dark:text-gray-200 hover:border-primary/50 dark:hover:border-primary/50 hover:shadow-sm transition-all active:scale-95">
                            <i class="fa-solid fa-arrow-down-a-z text-primary/80"></i>
                            <span th:text="#{artists.sort.label} + ': ' + (${currentSort == 'name,asc'} ? #{artists.sort.az} : (${currentSort == 'name,desc'} ? #{artists.sort.za} : #{artists.sort.newest}))">Sort: A-Z</span>
                            <i class="fa-solid fa-chevron-down text-[10px] ml-1 opacity-50 group-hover:rotate-180 transition-transform duration-300"></i>
                        </button>

                        <div class="absolute right-0 mt-2 w-48 origin-top-right bg-white/95 dark:bg-gray-900/95 backdrop-blur-xl border border-gray-200 dark:border-white/10 rounded-2xl shadow-2xl opacity-0 invisible scale-95 group-hover:opacity-100 group-hover:visible group-hover:scale-100 transition-all duration-200 ease-out py-1.5 z-50">

                            <a th:href="@{/artists(page=0, size=${artists.size}, sort='name,asc')}"
                               th:classappend="${currentSort == 'name,asc'} ? 'bg-primary/10 text-primary font-semibold' : 'text-gray-600 dark:text-gray-300'"
                               class="group/item flex items-center justify-between mx-1.5 px-3 py-2.5 text-sm rounded-xl hover:bg-gray-100 dark:hover:bg-white/10 transition-all active:scale-[0.98]">
                                <span th:text="#{artists.sort.az}">A - Z</span>
                                <i class="fa-solid fa-check text-[10px]" th:if="${currentSort == 'name,asc'}"></i>
                            </a>

                            <a th:href="@{/artists(page=0, size=${artists.size}, sort='name,desc')}"
                               th:classappend="${currentSort == 'name,desc'} ? 'bg-primary/10 text-primary font-semibold' : 'text-gray-600 dark:text-gray-300'"
                               class="group/item flex items-center justify-between mx-1.5 px-3 py-2.5 text-sm rounded-xl hover:bg-gray-100 dark:hover:bg-white/10 transition-all active:scale-[0.98]">
                                <span th:text="#{artists.sort.za}">Z - A</span>
                                <i class="fa-solid fa-check text-[10px]" th:if="${currentSort == 'name,desc'}"></i>
                            </a>

                            <div class="my-1.5 border-t border-gray-100 dark:border-white/5 mx-3"></div>

                            <a th:href="@{/artists(page=0, size=${artists.size}, sort='id,desc')}"
                               th:classappend="${currentSort == 'id,desc'} ? 'bg-primary/10 text-primary font-semibold' : 'text-gray-600 dark:text-gray-300'"
                               class="group/item flex items-center justify-between mx-1.5 px-3 py-2.5 text-sm rounded-xl hover:bg-gray-100 dark:hover:bg-white/10 transition-all active:scale-[0.98]">
                                <span th:text="#{artists.sort.newest}">Recently Added</span>
                                <i class="fa-solid fa-check text-[10px]" th:if="${currentSort == 'id,desc'}"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-x-6 gap-y-10">
                <div th:each="artist : ${artists.content}" class="flex flex-col items-center group text-center">

                    <div class="relative w-full aspect-square mb-4">

                        <a th:href="@{/artists/preview(id=${artist.id})}" class="block w-full aspect-square">
                            <img th:src="@{${artist.pictureUrl}}" th:alt="${artist.name}"
                                 class="w-full h-full object-cover rounded-full shadow-lg group-hover:shadow-primary/30 group-hover:ring-4 ring-primary/50 transition-all duration-300"/>
                        </a>

                        <div class="absolute inset-0 rounded-2xl bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end justify-center gap-2 p-3 z-10 pointer-events-none">
                            <a th:href="@{/artists/edit(id=${artist.id})}"
                               class="flex-1 flex items-center justify-center gap-1.5 py-1.5 rounded-xl text-xs font-semibold bg-white/15 hover:bg-blue-500/80 text-white border border-white/20 hover:border-blue-400 transition-all backdrop-blur-sm pointer-events-auto"
                               th:text="#{artists.edit}">Edit</a>

                            <a th:href="@{/artists/delete(id=${artist.id})}"
                               th:onclick="'return confirm(\'' + #{artists.confirm.delete} + '\')'"
                               class="flex-1 flex items-center justify-center gap-1.5 py-1.5 rounded-xl text-xs font-semibold bg-white/15 hover:bg-red-500/80 text-white border border-white/20 hover:border-red-400 transition-all backdrop-blur-sm pointer-events-auto"
                               th:text="#{artists.delete}">Delete</a>
                        </div>
                    </div>

                    <h3 class="font-bold text-gray-900 dark:text-white truncate w-full"
                        th:text="${#strings.isEmpty(artist.nickname) ? artist.name + ' ' + artist.surname : artist.nickname}">
                    </h3>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mt-0.5 truncate w-full" th:text="${artist.bio}"></p>
                </div>
            </div>
            <div class="flex justify-center mt-6">
                <ul class="inline-flex items-center space-x-2">
                    <li th:if="${artists.hasPrevious()}">
                        <a th:href="@{/artists(page=${artists.number - 1}, size=${artists.size}, sort=${currentSort})}"
                           class="px-3 py-1 border rounded hover:bg-gray-200 dark:hover:bg-gray-700">&laquo;</a>
                    </li>
                    <li th:unless="${artists.hasPrevious()}">
                        <span class="px-3 py-1 border rounded text-gray-400 cursor-not-allowed">&laquo;</span>
                    </li>
                    <li th:each="i : ${pageNumbers}">
                        <a th:href="@{/artists(page=${i - 1}, size=${artists.size}, sort=${currentSort})}"
                           th:text="${i}"
                           class="px-3 py-1 border rounded hover:bg-gray-200 dark:hover:bg-gray-700"
                           th:classappend="${i == artists.number + 1} ? ' bg-gray-300 dark:bg-gray-600' : ''">
                        </a>
                    </li>
                    <li th:if="${artists.hasNext()}">
                        <a th:href="@{/artists(page=${artists.number + 1}, size=${artists.size}, sort=${currentSort})}"
                           class="px-3 py-1 border rounded hover:bg-gray-200 dark:hover:bg-gray-700">&raquo;</a>
                    </li>
                    <li th:unless="${artists.hasNext()}">
                        <span class="px-3 py-1 border rounded text-gray-400 cursor-not-allowed">&raquo;</span>
                    </li>
                </ul>
            </div>
        </div>
    </main>
</section>
</body>
</html>
