<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<footer th:fragment="footer" class="mt-20 border-t border-white/5 py-12" data-purpose="site-footer">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="relative flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="flex items-center gap-2">
                <div class="w-6 h-6 bg-gray-700 rounded flex items-center justify-center">
                    <i class="fa-solid fa-waveform text-xs text-white"></i>
                </div>
                <span class="font-bold text-gray-400">SoundHub</span>
            </div>
            <div class="absolute left-1/2 -translate-x-1/2 flex flex-col items-center text-center space-y-1">
                <p class="text-gray-500 text-sm">SoundHub © 2026</p>
                <p class="text-gray-500 text-sm" th:text="#{footer.rights}">All rights reserved</p>
            </div>
            <div class="flex space-x-6 text-gray-500" data-purpose="social-links">
                <a class="hover:text-white transition-colors"
                   href="https://github.com/GrigorHovsepyan787/sound-hub-modular">
                    <i class="fa-brands fa-github text-xl"></i>
                </a>
            </div>
        </div>
    </div>
</footer>
</html>
