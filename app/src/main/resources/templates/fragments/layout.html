<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SoundHub - Your Music, Your Hub</title>
    <!-- Tailwind CSS v3 with Plugins -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- FontAwesome for Icons -->
    <link href="http://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <!-- BEGIN: Custom Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0b0b0b',
                            surface: '#181818',
                            accent: '#8b5cf6', // Vibrant Purple
                            accentHover: '#7c3aed',
                            secondary: '#10b981' // Green accent
                        }
                    },
                    backgroundImage: {
                        'hero-gradient': 'radial-gradient(circle at top right, rgba(139, 92, 246, 0.15), transparent), radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.1), transparent)'
                    }
                }
            }
        }
    </script>
    <!-- END: Custom Configuration -->
    <!-- BEGIN: Custom Styles -->
    <style data-purpose="layout-styles">
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            scroll-behavior: smooth;
        }

        .glass-header {
            background: rgba(11, 11, 11, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .album-card:hover .play-overlay {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
    <!-- END: Custom Styles -->
</head>
<body class="font-sans antialiased bg-brand-dark">

<div th:replace="~{fragments/navigation :: header}"></div>

<main class="pt-16">
    <th:block th:replace="${content}"></th:block>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<div th:if="${currentAudio} != null" id="main-player-bar" class="hidden fixed bottom-0 left-0 right-0 z-50 bg-black/80 backdrop-blur-xl border-t border-white/5 px-4 py-3">
    <div th:replace="~{fragments/player :: player_content}"></div>
</div>

<script data-purpose="mobile-nav-toggle">
    const menuToggle = document.getElementById('mobile-menu-toggle');
    // Simplified mobile toggle placeholder logic
    menuToggle.addEventListener('click', () => {
        alert('Mobile menu navigation triggered.');
    });
</script>
</body>
</html>
