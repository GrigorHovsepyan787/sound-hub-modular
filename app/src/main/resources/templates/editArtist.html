<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SoundHub - Edit Artist</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="http://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0b0b0b',
                            surface: '#181818',
                            accent: '#8b5cf6',
                            accentHover: '#7c3aed',
                            secondary: '#10b981'
                        }
                    },
                    backgroundImage: {
                        'hero-gradient': 'radial-gradient(circle at top right, rgba(139, 92, 246, 0.15), transparent), radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.1), transparent)'
                    }
                }
            }
        }
    </script>
    <style data-purpose="layout-styles">
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            scroll-behavior: smooth;
        }

        .glass-header {
            background: rgba(11, 11, 11, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .album-card:hover .play-overlay {
            opacity: 1;
            transform: translateY(0);
        }

        .flatpickr-calendar {
            background: #1e293b !important;
            border: 1px solid #334155 !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5) !important;
        }
        .flatpickr-day {
            color: #e2e8f0 !important;
        }
        .flatpickr-day:hover {
            background: #8b5cf6 !important;
            border-color: #8b5cf6 !important;
        }
        .flatpickr-day.selected {
            background: #8b5cf6 !important;
            border-color: #8b5cf6 !important;
        }
        .flatpickr-day.today {
            border-color: #8b5cf6 !important;
        }
        .flatpickr-months .flatpickr-month,
        .flatpickr-weekdays,
        span.flatpickr-weekday {
            background: #1e293b !important;
            color: #94a3b8 !important;
        }
        .flatpickr-current-month input.cur-year,
        .flatpickr-current-month .flatpickr-monthDropdown-months {
            color: #e2e8f0 !important;
            background: transparent !important;
        }
        .flatpickr-prev-month svg, .flatpickr-next-month svg {
            fill: #94a3b8 !important;
        }
        .flatpickr-day.flatpickr-disabled {
            color: #475569 !important;
        }

        #bandDropdown {
            display: none;
        }
        #bandDropdown.open {
            display: block;
        }
    </style>
</head>
<body class="font-sans antialiased bg-brand-dark">

<div th:replace="~{fragments/navigation :: header}"></div>

<main class="pt-16">
    <div class="px-40 flex flex-1 justify-center py-5">
        <div class="layout-content-container flex flex-col max-w-[960px] flex-1">
            <div class="flex flex-col flex-1 p-10 gap-8">

                <div class="flex flex-col gap-2">
                    <div class="flex items-center gap-3">
                        <a href="/artists" class="text-slate-500 hover:text-slate-300 transition-colors">
                            <i class="fa-solid fa-arrow-left text-sm"></i>
                        </a>
                        <h1 class="tracking-tight text-3xl font-bold leading-tight">Edit Artist</h1>
                    </div>
                    <p class="text-slate-400 text-sm font-normal leading-normal pl-6">
                        Update the details for
                        <span class="text-slate-200 font-medium"
                              th:text="${artist.nickname != null && !#strings.isEmpty(artist.nickname) ? artist.nickname : artist.name + ' ' + artist.surname}">
                            Artist Name
                        </span>
                    </p>
                </div>

                <form th:action="@{/artists/edit}" method="post" enctype="multipart/form-data" class="flex flex-col gap-6">

                    <input type="hidden" name="id" th:value="${artist.id}"/>

                    <div class="flex w-full gap-6">

                        <div class="w-1/3 flex flex-col gap-2">
                            <p class="text-sm font-medium leading-normal">Profile Picture</p>

                            <label for="artistImage" class="relative w-full aspect-square rounded-xl overflow-hidden cursor-pointer group">

                                <img th:if="${artist.pictureUrl != null && !#strings.isEmpty(artist.pictureUrl)}"
                                     th:src="@{${artist.pictureUrl}}"
                                     alt="Profile picture"
                                     id="imagePreview"
                                     class="w-full h-full object-cover"/>

                                <div th:unless="${artist.pictureUrl != null && !#strings.isEmpty(artist.pictureUrl)}"
                                     id="imagePlaceholder"
                                     class="w-full h-full bg-slate-800 flex flex-col items-center justify-center">
                                    <i class="fa-solid fa-user text-5xl text-slate-600"></i>
                                </div>

                                <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col items-center justify-center gap-2">
                                    <i class="fa-solid fa-camera text-2xl text-white"></i>
                                    <span class="text-xs font-medium text-white">Change Photo</span>
                                </div>

                                <input id="artistImage" name="artistImage" type="file" accept="image/*" class="hidden"/>
                            </label>

                            <p id="file-name" class="text-xs text-slate-500 text-center truncate"></p>
                        </div>

                        <div class="w-2/3 flex flex-col gap-4">
                            <div class="flex gap-4">
                                <label class="flex flex-col flex-1">
                                    <p class="text-sm font-medium leading-normal pb-2">First Name</p>
                                    <input
                                            type="text"
                                            name="name"
                                            id="name"
                                            required
                                            th:value="${artist.name}"
                                            class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded text-slate-100 focus:outline-0 focus:ring-1 focus:ring-brand-accent border border-slate-700 bg-slate-900 h-12 placeholder:text-slate-500 px-4 text-sm font-normal leading-normal"
                                            placeholder="Enter first name"/>
                                </label>
                                <label class="flex flex-col flex-1">
                                    <p class="text-sm font-medium leading-normal pb-2">Last Name</p>
                                    <input
                                            type="text"
                                            name="surname"
                                            id="surname"
                                            required
                                            th:value="${artist.surname}"
                                            class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded text-slate-100 focus:outline-0 focus:ring-1 focus:ring-brand-accent border border-slate-700 bg-slate-900 h-12 placeholder:text-slate-500 px-4 text-sm font-normal leading-normal"
                                            placeholder="Enter last name"/>
                                </label>
                            </div>
                            <div class="flex gap-4">
                                <label class="flex flex-col flex-1">
                                    <p class="text-sm font-medium leading-normal pb-2">Nickname / Stage Name</p>
                                    <input
                                            type="text"
                                            name="nickname"
                                            id="nickname"
                                            th:value="${artist.nickname}"
                                            class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded text-slate-100 focus:outline-0 focus:ring-1 focus:ring-brand-accent border border-slate-700 bg-slate-900 h-12 placeholder:text-slate-500 px-4 text-sm font-normal leading-normal"
                                            placeholder="Enter nickname"/>
                                </label>
                                <label class="flex flex-col flex-1">
                                    <p class="text-sm font-medium leading-normal pb-2">Birth Date</p>
                                    <div class="relative">
                                        <input
                                                type="text"
                                                name="birthDate"
                                                id="birthdate"
                                                required
                                                autocomplete="off"
                                                th:value="${artist.birthDate}"
                                                class="form-input flex w-full min-w-0 resize-none overflow-hidden rounded text-slate-100 focus:outline-0 focus:ring-1 focus:ring-brand-accent border border-slate-700 bg-slate-900 h-12 placeholder:text-slate-500 px-4 pr-10 text-sm font-normal leading-normal"
                                                placeholder="YYYY-MM-DD"/>
                                        <i class="fa-regular fa-calendar absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none"></i>
                                    </div>
                                </label>
                            </div>
                        </div>
                    </div>

                    <label class="flex flex-col w-full">
                        <p class="text-sm font-medium leading-normal pb-2">Biography</p>
                        <textarea
                                name="bio"
                                id="biography"
                                class="form-textarea flex w-full min-w-0 flex-1 resize-y overflow-auto rounded text-slate-100 focus:outline-0 focus:ring-1 focus:ring-brand-accent border border-slate-700 bg-slate-900 min-h-[120px] placeholder:text-slate-500 p-4 text-sm font-normal leading-normal"
                                placeholder="Write the artist's biography here..."
                                th:text="${artist.bio}"></textarea>
                    </label>

                    <div class="flex flex-col w-full gap-2">
                        <p class="text-sm font-medium leading-normal">Select Groups/Bands</p>
                        <div class="relative w-full" id="bandSelectorWrapper">

                            <button type="button" id="bandDropdownToggle"
                                    class="w-full flex items-center justify-between px-4 h-12 rounded border border-slate-700 bg-slate-900 text-sm text-slate-400 hover:border-slate-500 transition-colors focus:outline-none focus:ring-1 focus:ring-brand-accent">
                                <span id="bandToggleLabel">Select bands...</span>
                                <i class="fa-solid fa-chevron-down text-slate-500 text-xs transition-transform" id="bandChevron"></i>
                            </button>

                            <div id="bandDropdown"
                                 class="absolute z-20 w-full mt-1 rounded border border-slate-700 bg-slate-900 shadow-xl">
                                <div class="flex items-center px-4 py-3 border-b border-slate-700">
                                    <i class="fa-solid fa-magnifying-glass text-slate-500 mr-2 text-sm"></i>
                                    <input
                                            type="text"
                                            id="bandSearch"
                                            class="w-full bg-transparent border-none focus:outline-none focus:ring-0 text-sm text-slate-100 placeholder:text-slate-500"
                                            placeholder="Search bands..."/>
                                </div>
                                <div class="flex flex-col max-h-48 overflow-y-auto p-2 gap-1" id="bandList">
                                    <th:block th:each="band : ${bands}">
                                        <label class="band-option flex items-center gap-3 px-3 py-2 hover:bg-slate-800 rounded cursor-pointer">
                                            <input
                                                    type="checkbox"
                                                    name="bandIds"
                                                    th:value="${band.id}"
                                                    th:checked="${artist.bands != null && artist.bands.contains(band)}"
                                                    class="band-checkbox form-checkbox rounded border-slate-600 bg-transparent h-4 w-4 accent-violet-500"/>
                                            <span class="text-sm band-name" th:text="${band.name}">Band Name</span>
                                        </label>
                                    </th:block>
                                    <p id="noResults" class="hidden text-xs text-slate-500 px-3 py-2">No bands found.</p>
                                </div>
                            </div>
                        </div>

                        <div id="selectedBandTags" class="flex flex-wrap gap-2 mt-1"></div>
                    </div>

                    <div class="flex justify-between gap-4 mt-6 pt-6 border-t border-slate-800">
                        <a th:href="@{/artists/delete(id=${artist.id})}"
                           onclick="return confirm('Are you sure you want to delete this artist? This action cannot be undone.')"
                           class="px-6 py-2.5 rounded font-medium text-sm text-red-400 bg-red-950/40 hover:bg-red-900/50 border border-red-900/50 hover:border-red-700 transition-colors inline-flex items-center gap-2">
                            <i class="fa-solid fa-trash-can"></i>
                            Delete Artist
                        </a>

                        <div class="flex gap-4">
                            <a href="/artists"
                               class="px-6 py-2.5 rounded font-medium text-sm text-slate-300 bg-slate-800 hover:bg-slate-700 transition-colors inline-flex items-center">
                                Cancel
                            </a>
                            <button type="submit"
                                    class="px-6 py-2.5 rounded font-medium text-sm text-white bg-brand-accent hover:bg-brand-accentHover transition-colors inline-flex items-center gap-2">
                                <i class="fa-solid fa-floppy-disk"></i>
                                Save Changes
                            </button>
                        </div>
                    </div>

                </form>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<div th:if="${currentAudio} != null" id="main-player-bar" class="hidden fixed bottom-0 left-0 right-0 z-50 bg-black/80 backdrop-blur-xl border-t border-white/5 px-4 py-3">
    <div th:replace="~{fragments/player :: player_content}"></div>
</div>

<script data-purpose="mobile-nav-toggle">
    const menuToggle = document.getElementById('mobile-menu-toggle');
    if (menuToggle) {
        menuToggle.addEventListener('click', () => {
            alert('Mobile menu navigation triggered.');
        });
    }
</script>

<script data-purpose="flatpickr-birthdate">
    document.addEventListener("DOMContentLoaded", function () {
        flatpickr("#birthdate", {
            minDate: "1900-01-01",
            maxDate: "today",
            dateFormat: "Y-m-d",
            disableMobile: true,
            allowInput: true
        });
    });
</script>

<script data-purpose="file-upload-label">
    document.addEventListener("DOMContentLoaded", function () {
        const fileInput = document.getElementById('artistImage');
        const fileNameEl = document.getElementById('file-name');

        fileInput.addEventListener('change', function () {
            if (this.files.length > 0) {
                fileNameEl.textContent = this.files[0].name;

                const reader = new FileReader();
                reader.onload = function (e) {
                    const placeholder = document.getElementById('imagePlaceholder');
                    if (placeholder) placeholder.remove();

                    let preview = document.getElementById('imagePreview');
                    if (!preview) {
                        preview = document.createElement('img');
                        preview.id = 'imagePreview';
                        preview.className = 'w-full h-full object-cover';
                        preview.alt = 'Profile picture';
                        fileInput.closest('label').prepend(preview);
                    }
                    preview.src = e.target.result;
                };
                reader.readAsDataURL(this.files[0]);
            }
        });
    });
</script>

<script data-purpose="band-dropdown">
    document.addEventListener("DOMContentLoaded", function () {
        const toggle = document.getElementById('bandDropdownToggle');
        const dropdown = document.getElementById('bandDropdown');
        const chevron = document.getElementById('bandChevron');
        const searchInput = document.getElementById('bandSearch');
        const bandList = document.getElementById('bandList');
        const toggleLabel = document.getElementById('bandToggleLabel');
        const tagsContainer = document.getElementById('selectedBandTags');
        const noResults = document.getElementById('noResults');

        toggle.addEventListener('click', function () {
            dropdown.classList.toggle('open');
            chevron.classList.toggle('rotate-180');
            if (dropdown.classList.contains('open')) {
                searchInput.focus();
            }
        });

        document.addEventListener('click', function (e) {
            if (!document.getElementById('bandSelectorWrapper').contains(e.target)) {
                dropdown.classList.remove('open');
                chevron.classList.remove('rotate-180');
            }
        });

        searchInput.addEventListener('input', function () {
            const query = this.value.toLowerCase();
            const options = bandList.querySelectorAll('.band-option');
            let visible = 0;
            options.forEach(function (opt) {
                const name = opt.querySelector('.band-name').textContent.toLowerCase();
                if (name.includes(query)) {
                    opt.style.display = '';
                    visible++;
                } else {
                    opt.style.display = 'none';
                }
            });
            noResults.classList.toggle('hidden', visible > 0);
        });

        function updateTags() {
            const checked = bandList.querySelectorAll('.band-checkbox:checked');
            tagsContainer.innerHTML = '';
            checked.forEach(function (cb) {
                const name = cb.closest('label').querySelector('.band-name').textContent;
                const tag = document.createElement('span');
                tag.className = 'inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium bg-violet-900/60 text-violet-300 border border-violet-700/50';
                tag.innerHTML = `${name} <button type="button" class="text-violet-400 hover:text-white" data-id="${cb.value}"><i class="fa-solid fa-xmark"></i></button>`;
                tag.querySelector('button').addEventListener('click', function () {
                    cb.checked = false;
                    updateTags();
                });
                tagsContainer.appendChild(tag);
            });
            toggleLabel.textContent = checked.length > 0
                ? `${checked.length} band${checked.length > 1 ? 's' : ''} selected`
                : 'Select bands...';
        }

        updateTags();

        bandList.addEventListener('change', updateTags);
    });
</script>

</body>
</html>
