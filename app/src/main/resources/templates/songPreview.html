<!DOCTYPE html>

<html class="dark" lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SoundHub - Midnight Echoes</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
          rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
          rel="stylesheet"/>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .track-gradient {
            background: linear-gradient(180deg, rgba(16, 19, 26, 0) 0%, rgba(16, 19, 26, 1) 100%);
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary": "#ffb68c",
                        "surface-container-low": "#181c22",
                        "error-container": "#93000a",
                        "secondary-fixed-dim": "#c6c6c7",
                        "on-primary-fixed": "#001b3e",
                        "error": "#ffb4ab",
                        "inverse-primary": "#005db8",
                        "primary-container": "#4090fe",
                        "primary": "#aac7ff",
                        "surface-container-high": "#272a31",
                        "on-primary-container": "#002958",
                        "surface": "#10131a",
                        "secondary-container": "#454747",
                        "surface-container-lowest": "#0b0e15",
                        "on-tertiary-fixed-variant": "#763400",
                        "on-tertiary-container": "#481d00",
                        "surface-dim": "#10131a",
                        "on-secondary-fixed": "#1a1c1c",
                        "background": "#10131a",
                        "on-tertiary": "#532200",
                        "on-secondary": "#2f3131",
                        "on-background": "#e0e2ec",
                        "on-primary-fixed-variant": "#00458d",
                        "outline-variant": "#414753",
                        "on-error-container": "#ffdad6",
                        "on-surface-variant": "#c1c6d5",
                        "outline": "#8b919f",
                        "surface-container": "#1c2026",
                        "tertiary-container": "#e3711f",
                        "on-secondary-container": "#b4b5b5",
                        "surface-bright": "#363940",
                        "primary-fixed-dim": "#aac7ff",
                        "tertiary-fixed": "#ffdbc9",
                        "secondary": "#c6c6c7",
                        "on-primary": "#002f64",
                        "on-secondary-fixed-variant": "#454747",
                        "tertiary-fixed-dim": "#ffb68c",
                        "inverse-on-surface": "#2d3038",
                        "on-tertiary-fixed": "#321200",
                        "on-surface": "#e0e2ec",
                        "inverse-surface": "#e0e2ec",
                        "secondary-fixed": "#e2e2e2",
                        "surface-variant": "#32353c",
                        "surface-tint": "#aac7ff",
                        "on-error": "#690005",
                        "primary-fixed": "#d6e3ff",
                        "surface-container-highest": "#32353c"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "player-height": "88px",
                        "track-padding": "0.75rem 1rem",
                        "container-max": "1280px",
                        "section-gap": "3rem",
                        "gutter": "1.5rem"
                    },
                    "fontFamily": {
                        "body-sm": ["Inter"],
                        "label-caps": ["Inter"],
                        "display-xl": ["Inter"],
                        "body-lg": ["Inter"],
                        "display-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "player-time": ["Inter"]
                    },
                    "fontSize": {
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "600"}],
                        "display-xl": ["72px", {"lineHeight": "1.1", "letterSpacing": "-0.05em", "fontWeight": "900"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "500"}],
                        "display-lg": ["60px", {"lineHeight": "1.1", "letterSpacing": "-0.05em", "fontWeight": "900"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "player-time": ["10px", {"lineHeight": "12px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
</head>
<body>
<th:block th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
    <section class="bg-background text-on-background font-body-lg antialiased">
        <main class="min-h-screen pb-12">
            <section class="relative w-full h-[614px] md:h-[716px] flex items-end overflow-hidden">
                <img alt="Album Art" class="absolute inset-0 w-full h-full object-cover"
                     data-alt="cinematic high-fidelity album cover featuring neon blue urban lights reflecting on dark rainy asphalt at night with abstract lens flare"
                     th:src="${song.album.pictureUrl}"/>
                <div class="absolute inset-0 track-gradient"></div>
                <div class="relative z-10 max-w-[1280px] mx-auto w-full px-gutter pb-12 grid grid-cols-1 md:grid-cols-12 gap-8 items-end">
                    <div class="md:col-span-4 lg:col-span-3">
                        <div class="aspect-square w-full rounded-lg overflow-hidden shadow-2xl shadow-blue-900/20 border border-white/10 group relative">
                            <img alt="Album Cover"
                                 class="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-700"
                                 data-alt="minimalist album cover with deep blue and black geometric shapes and a glowing neon circle in the center"
                                 th:src="${song.album.pictureUrl}"/>
                        </div>
                    </div>
                    <div class="md:col-span-8 lg:col-span-9 space-y-6">
                        <div class="space-y-2">
                            <h1 class="font-display-lg text-display-lg text-white leading-tight"
                                th:text="${song.title}"></h1>
                            <div class="flex items-center gap-4 pt-2">
                                <div class="flex items-center gap-3 bg-white/5 hover:bg-white/10 p-1.5 pr-4 rounded-full border border-white/5 transition-all cursor-pointer"
                                     th:if="${song.artist != null}">
                                    <a th:href="@{/artists/preview(id=${song.artist.id})}"
                                       class="flex items-center gap-3">
                                        <img alt="Performer image"
                                             class="w-10 h-10 rounded-full object-cover"
                                             th:src="${song.artist.pictureUrl}"/>
                                        <div>
                                            <p class="font-body-lg text-body-lg text-white leading-none"
                                               th:text="${song.artist.nickname}"></p>
                                        </div>
                                    </a>
                                </div>
                                <div class="flex items-center gap-3 bg-white/5 hover:bg-white/10 p-1.5 pr-4 rounded-full border border-white/5 transition-all cursor-pointer"
                                     th:if="${song.band != null}">
                                    <a th:href="@{/bands/preview(id=${song.band.id})}"
                                       class="flex items-center gap-3">
                                        <img alt="Performer image"
                                             class="w-10 h-10 rounded-full object-cover"
                                             th:src="${song.band.pictureUrl}"/>
                                        <div>
                                            <p class="font-body-lg text-body-lg text-white leading-none"
                                               th:text="${song.band.name}"></p>
                                        </div>
                                    </a>
                                </div>
                                <span class="text-white/20">•</span>
                                <p class="font-body-sm text-body-sm text-on-surface-variant"
                                   th:text="${song.album.title}"></p>
                                <span class="text-white/20">•</span>
                                <p class="font-body-sm text-body-sm text-on-surface-variant"
                                   th:text="${song.album.releaseDate.year}"></p>
                                <button type="button"
                                        th:data-id="${song.id}"
                                        th:data-title="${song.title}"
                                        th:data-performer="${song.band?.name ?: song.artist?.nickname}"
                                        th:data-url="${song.songUrl}"
                                        data-play-btn
                                        class="bg-primary-container text-on-primary-container px-8 py-4 rounded-full flex items-center gap-3 font-bold hover:scale-105 active:scale-95 transition-all shadow-lg shadow-blue-500/20 group">
                                    <span class="material-symbols-outlined fill-current"
                                          style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                                    PLAY
                                </button>
                                </button>
                                <button class="p-4 rounded-full border border-white/20 text-white hover:bg-white/10 hover:border-white transition-all active:scale-90">
                                    <span class="material-symbols-outlined">favorite</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            <section class="max-w-[1280px] mx-auto px-gutter mt-12 grid grid-cols-1 lg:grid-cols-12 gap-12">
                <div class="lg:col-span-7 space-y-8">
                    <div class="space-y-6">
                        <h2 class="font-headline-md text-headline-md text-white">Comments <span
                                th:text="${comments.size}"></span></h2>
                        <div class="flex gap-4">
                            <img alt="User Avatar" class="w-12 h-12 rounded-full object-cover border border-white/10"
                                 data-alt="portrait of a man with short hair and a neat beard, soft professional lighting, dark grey background"
                                 th:src="${currentUser.pictureUrl}"/>
                            <div class="flex-1 space-y-3">
                                <form th:action="@{/songs/comment/add}" method="post" th:object="${songCommentRequest}">
                                    <input type="hidden"
                                           name="songId"
                                           th:value="${song.id}">
                                    <label>
                                        <textarea name="content"
                                                  th:field="*{content}"
                                                  rows="3"
                                                  class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-sm text-white placeholder-gray-500 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all resize-none min-h-[100px]"
                                                  placeholder="Share your thoughts on this song...">
                                        </textarea>
                                    </label>
                                    <p class="text-red-500 text-sm mt-1"
                                       th:if="${#fields.hasErrors('content')}"
                                       th:errors="*{content}"></p>
                                    <div class="flex justify-end">
                                        <button class="bg-primary hover:bg-primary/90 text-white text-sm font-bold px-6 py-2 rounded-full transition-colors">
                                            Post Comment
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                        <div class="space-y-8">
                            <div class="flex gap-4 group" th:each="comment : ${comments}"
                                 th:if="${!comment.deleted
                                    or #authorization.expression(
                                    'hasAuthority(''ADMIN'') or hasAuthority(''MODERATOR'')')}">
                                <img alt="Commenter Avatar" class="w-10 h-10 rounded-full object-cover shrink-0"
                                     th:src="${comment.user.pictureUrl}"/>
                                <div class="flex-1 border-b border-white/5 pb-6">
                                    <div class="flex items-center gap-2 mb-1">
                                        <span class="font-bold text-white text-sm"
                                              th:text="${comment.user.username}"></span>
                                        <span class="text-xs text-gray-500"
                                              th:text="${#temporals.format(comment.createdAt, 'dd.MM.yyyy HH:mm')}"></span>
                                    </div>
                                    <p class="text-gray-300 text-sm leading-relaxed" th:text="${comment.content}"></p>
                                    <div class="flex items-center gap-4 mt-3">
                                        <form th:action="@{/songs/comment/rate}" method="post"
                                              class="flex items-center gap-2">
                                            <input type="hidden"
                                                   name="commentId"
                                                   th:value="${comment.id}">
                                            <input type="hidden"
                                                   name="songId"
                                                   th:value="${song.id}">
                                            <button type="submit"
                                                    name="value"
                                                    value="1"
                                                    class="flex items-center gap-1 text-gray-500 hover:text-white transition-colors text-xs">
                                                <span class="material-symbols-outlined text-sm">thumb_up</span>
                                            </button>
                                            <button type="submit"
                                                    name="value"
                                                    value="-1"
                                                    class="flex items-center gap-1 text-gray-500 hover:text-white transition-colors text-xs">
                                                <span class="material-symbols-outlined text-sm">thumb_down</span>
                                            </button>
                                            <span th:text="${comment.rating}"></span>
                                        </form>
                                        <p class="text-gray-500 text-sm italic"
                                           th:if="${comment.deleted}">
                                            Comment deleted
                                        </p>
                                        <div sec:authorize="hasAuthority('ADMIN') or hasAuthority('MODERATOR')">
                                            <a class="text-gray-500 hover:text-white transition-colors text-xs font-semibold"
                                               th:if="${comment.deleted == true}"
                                               th:href="@{/songs/comment/restore(commentId=${comment.id}, songId=${song.id})}">
                                                <span class="material-symbols-outlined text-sm">restore</span>
                                            </a>
                                            <a class="text-gray-500 hover:text-white transition-colors text-xs font-semibold"
                                               th:if="${comment.deleted == false}"
                                               th:href="@{/songs/comment/softDelete(commentId=${comment.id}, songId=${song.id})}">
                                                <span class="material-symbols-outlined text-sm">block</span>
                                            </a>
                                            <a class="text-gray-500 hover:text-white transition-colors text-xs font-semibold"
                                               th:href="@{/songs/comment/delete(commentId=${comment.id}, songId=${song.id})}">
                                                <span class="material-symbols-outlined text-sm">delete</span>
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="flex gap-2" th:if="${comments.hasNext() || comments.hasPrevious()}">
                                <a th:href="@{/songs/preview(
                        id=${song.id},
                        page=${comments.number}-1)}">
                                    <button class="px-3 py-1 rounded border border-border-dark text-text-muted hover:bg-background-dark hover:text-slate-100 disabled:opacity-50 disabled:cursor-not-allowed"
                                            th:disabled="${!comments.hasPrevious()}">
                                        Previous
                                    </button>
                                </a>
                                <a th:href="@{/songs/preview(
                        id=${song.id},
                        page=${comments.number}+1)}">
                                    <button class="px-3 py-1 rounded border border-border-dark text-text-muted hover:bg-background-dark hover:text-slate-100 disabled:opacity-50 disabled:cursor-not-allowed"
                                            th:disabled="${!comments.hasNext()}">
                                        Next
                                    </button>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-5 space-y-8">
                    <div class="glass-panel p-6 rounded-lg space-y-6 flex flex-col h-full">

                        <h3 class="font-label-caps text-label-caps text-on-surface-variant">
                            UP NEXT
                        </h3>

                        <div class="space-y-4">
                            <div class="flex items-center gap-4 group cursor-pointer"
                                 th:each="nextSong, stat : ${albumSongs}"
                                 th:if="${stat.index < 4}">
                                    <div class="relative w-12 h-12 rounded overflow-hidden">
                                        <a th:href="@{/songs/preview(id=${nextSong.id})}">
                                        <img class="w-full h-full object-cover"
                                             alt="Next song picture"
                                             th:src="${nextSong.pictureUrl}"/>
                                        </a>
                                    </div>
                                    <div class="flex-1">
                                        <p class="text-white font-medium group-hover:text-primary transition-colors"
                                           th:text="${nextSong.title}"></p>
                                        <p class="text-xs text-on-surface-variant"
                                           th:text="${nextSong.artistNickname}"
                                           th:if="${nextSong.artistNickname != null}"></p>
                                        <p class="text-xs text-on-surface-variant"
                                           th:text="${nextSong.bandName}"
                                           th:if="${nextSong.bandName != null}"></p>
                                    </div>
                                    <span class="text-xs text-on-surface-variant"
                                          th:text="${nextSong.durationFormatted}">
                                </span>
                            </div>
                        </div>
                        <a class="mt-auto w-full py-3 rounded-full border border-white/10
                  hover:bg-white/5 text-sm font-bold
                  text-on-surface-variant hover:text-white transition-all"
                           th:href="@{/albums/preview(id=${song.album.id})}">
                            VIEW FULL ALBUM
                        </a>
                    </div>
                </div>
                <script>
                    (function () {
                        const buttons = Array.from(document.querySelectorAll('[data-play-btn]'));
                        const songs = buttons.map(btn => ({
                            id: btn.dataset.id,
                            title: btn.dataset.title,
                            performer: btn.dataset.performer,
                            url: btn.dataset.url,
                        }));
                        document.dispatchEvent(new CustomEvent('soundhub:register', {detail: {songs}}));

                        buttons.forEach(btn => {
                            btn.addEventListener('click', () => {
                                document.dispatchEvent(new CustomEvent('soundhub:play', {
                                    detail: {
                                        id: btn.dataset.id,
                                        title: btn.dataset.title,
                                        performer: btn.dataset.performer,
                                        url: btn.dataset.url,
                                        songs: songs,
                                    }
                                }));
                            });
                        });
                    })();

                    function bindPlayButtons() {
                        const buttons = Array.from(document.querySelectorAll('[data-play-btn]'));

                        const songs = buttons.map(btn => ({
                            id: btn.dataset.id,
                            title: btn.dataset.title,
                            performer: btn.dataset.performer,
                            url: btn.dataset.url,
                        }));

                        document.dispatchEvent(new CustomEvent('soundhub:register', {detail: {songs}}));

                        buttons.forEach(btn => {
                            btn.addEventListener('click', () => {
                                document.dispatchEvent(new CustomEvent('soundhub:play', {
                                    detail: {
                                        id: btn.dataset.id,
                                        title: btn.dataset.title,
                                        performer: btn.dataset.performer,
                                        url: btn.dataset.url,
                                        songs: songs,
                                    }
                                }));
                            });
                        });
                    }

                    bindPlayButtons();
                </script>
            </section>
        </main>
    </section>
</th:block>
</body>
</html>
