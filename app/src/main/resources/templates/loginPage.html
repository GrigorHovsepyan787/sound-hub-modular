<!DOCTYPE html>

<html class="dark" lang="en"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SoundHub - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">        tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#6366f1",
                    "background-light": "#f8f6f6",
                    "background-dark": "#0b0b0b",
                    "neutral-dark": "#181818",
                    "accent-purple": "#8b5cf6",
                },
                fontFamily: {
                    "display": ["Public Sans", "sans-serif"]
                },
                borderRadius: {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
                },
            },
        },
    }</script>
    <style>
        body {
            font-family: 'Public Sans', sans-serif;
            background-color: #0b0b0b;
        }
    </style>
</head>
<body class="bg-background-light min-h-screen flex items-center justify-center font-display antialiased transition-colors duration-300 dark:bg-black">
<div class="fixed inset-0 z-0 opacity-40 dark:opacity-20 pointer-events-none">
    <div class="absolute inset-0 bg-gradient-to-br from-primary/30 via-transparent to-accent-purple/30"></div>
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/20 blur-[120px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-accent-purple/20 blur-[120px]"></div>
</div>
<div class="relative z-10 w-full max-w-md px-6 py-12">
    <div class="bg-white/80 dark:bg-neutral-dark/90 backdrop-blur-xl border border-slate-200 dark:border-primary/10 rounded-xl shadow-2xl p-8 md:p-10">
        <div class="flex flex-col items-center mb-8">
            <div class="mb-4 p-3 bg-primary rounded-xl shadow-lg shadow-primary/30">
                <span class="material-symbols-outlined text-white text-4xl">graphic_eq</span>
            </div>
            <h1 class="text-3xl font-bold text-slate-900 dark:text-slate-100 tracking-tight">SoundHub</h1>
            <p class="text-slate-500 dark:text-slate-400 mt-2 text-center">Music for every moment</p>
        </div>
        <div class="mb-8">
            <h2 class="text-2xl font-bold text-slate-900 dark:text-slate-100">Welcome Back</h2>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Please enter your details to sign in.</p>
        </div>
        <form class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5 ml-1" for="username">Username</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
                        <span class="material-symbols-outlined text-[20px]">person</span>
                    </div>
                    <input class="block w-full pl-11 pr-4 py-3.5 bg-slate-50 dark:bg-background-dark/50 border border-slate-200 dark:border-primary/20 rounded-xl text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" id="username" name="username" placeholder="Enter your username" type="text"/>
                </div>
            </div>
            <div>
                <div class="flex justify-between items-center mb-1.5 ml-1">
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="password">Password</label>
                    <a class="text-xs font-semibold text-primary hover:text-primary/80 transition-colors" href="#">Forgot Password?</a>
                </div>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
                        <span class="material-symbols-outlined text-[20px]">lock</span>
                    </div>
                    <input class="block w-full pl-11 pr-12 py-3.5 bg-slate-50 dark:bg-background-dark/50 border border-slate-200 dark:border-primary/20 rounded-xl text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
                    <button class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors" type="button">
                        <span class="material-symbols-outlined text-[20px]">visibility</span>
                    </button>
                </div>
            </div>
            <div class="flex items-center ml-1">
                <input class="h-4 w-4 text-primary focus:ring-primary border-slate-300 dark:border-primary/30 rounded bg-white dark:bg-neutral-dark" id="remember-me" name="remember-me" type="checkbox"/>
                <label class="ml-2 block text-sm text-slate-600 dark:text-slate-400" for="remember-me">Remember me for 30 days</label>
            </div>
            <button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-xl shadow-lg shadow-primary/30 transform active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
                <span>Login to your account</span>
                <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
            </button>
        </form>
        <div class="mt-8 pt-6 border-t border-slate-100 dark:border-primary/10">
            <div class="flex flex-col gap-4">
                <p class="text-center text-slate-500 dark:text-slate-400 text-sm">
                    Don't have an account?
                    <a class="text-primary font-bold hover:underline decoration-2 underline-offset-4 transition-all" href="#">Sign up for free</a>
                </p>
            </div>
        </div>
    </div>
    <div class="mt-8 flex justify-center gap-6 text-slate-400 dark:text-slate-500">
        <a class="text-xs hover:text-primary transition-colors" href="#">Privacy Policy</a>
        <a class="text-xs hover:text-primary transition-colors" href="#">Terms of Service</a>
        <a class="text-xs hover:text-primary transition-colors" href="#">Help Center</a>
    </div>
</div>
<div class="fixed bottom-6 right-6 z-20">
    <button class="flex items-center justify-center w-12 h-12 rounded-full bg-neutral-dark dark:bg-white text-white dark:text-neutral-dark shadow-xl hover:scale-110 active:scale-95 transition-all">
        <span class="material-symbols-outlined">headset_mic</span>
    </button>
</div>
</body></html>
