<!DOCTYPE html>

<html class="dark" lang="en"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {},
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 antialiased min-h-screen flex flex-col">
<header class="flex justify-center items-center w-full max-w-2xl mx-auto pt-8 pb-4">
    <div class="flex flex-col items-center gap-2">
        <h1 class="text-2xl font-black text-blue-600 dark:text-blue-400 tracking-tight">SoundHub</h1>
    </div>
</header>
<main class="flex-grow flex items-center justify-center px-4 py-12">
    <section class="w-full max-w-lg bg-slate-900 border border-slate-800 rounded-lg p-8 md:p-12 shadow-2xl relative overflow-hidden">
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-blue-600/10 rounded-full blur-3xl"></div>
        <div class="relative z-10 text-center">
            <h2 class="text-3xl font-headline font-extrabold text-white mb-4" th:text="#{mailVerification.verify}">Verify Your Account</h2>
            <p class="text-slate-400 font-body mb-10 leading-relaxed" th:text="#{mailVerification.complete}">
                To complete your SoundHub registration, please enter the following 6-digit verification code in the app.
            </p>
            <div class="flex justify-center gap-2 md:gap-3 mb-10">
                <div class="w-13 h-16 md:w-38 md:h-20 bg-slate-800 border border-slate-700 flex items-center justify-center rounded-lg shadow-inner">
                    <span class="text-3xl md:text-4xl font-black text-blue-400 tracking-widest" th:text="${verificationCode}"></span>
                </div>
            </div>
            <div class="bg-slate-800/50 rounded-lg p-4 mb-8 flex items-start gap-3 text-left">
                <span class="material-symbols-outlined text-blue-400 mt-0.5" data-icon="shield">shield</span>
                <p class="text-m text-slate-400 leading-tight">
                    <span th:text="#{mailVerification.note}">Security Note: This code will expire in 15 minutes.</span>
                </p>
            </div>
        </div>
    </section>
</main>
<footer class="flex flex-col items-center gap-4 w-full max-w-2xl mx-auto text-center py-12 border-t border-slate-800 mt-8">
    <p class="text-lg font-bold text-slate-400">SoundHub</p>
    <p class="text-sm font-inter text-slate-500 dark:text-slate-400 mt-2" th:text="#{mailVerification.rights}">
        © 2026 SoundHub. All rights reserved.
    </p>
</footer>
</body></html>
