<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
  <title th:text="${band.name} + ' - SoundHub'">Band Preview - SoundHub</title>
</head>

<section>
  <main class="flex-1 px-6 md:px-20 lg:px-40 py-10 max-w-5xl mx-auto w-full">

    <section class="relative flex flex-col items-center text-center mb-16">

      <div class="absolute top-0 left-0">
        <a th:href="@{/bands}"
           class="flex items-center gap-2 px-4 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full text-sm font-medium text-gray-700 dark:text-gray-200 hover:border-primary/50 dark:hover:border-primary/50 hover:shadow-sm transition-all active:scale-95">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-primary/80" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"/>
            <polyline points="12 19 5 12 12 5"/>
          </svg>
          <span th:text="#{band.preview.backToBands}">Back to Bands</span>
        </a>
      </div>

      <div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full h-40 w-40 mb-6 ring-4 ring-primary/20 shadow-xl"
           th:style="${band.pictureUrl != null}
             ? 'background-image: url(' + ${band.getPictureUrl()} + ');'
             : 'background-color: #1978e5;'">
      </div>

      <h1 class="text-4xl md:text-5xl font-bold text-slate-900 dark:text-white mb-2 tracking-tight"
          th:text="${band.name}"></h1>
      <p class="text-slate-500 text-sm mt-1">
        <span th:text="#{band.preview.founded}">Founded at</span>
        <span th:text="${#temporals.format(band.createdDate, 'yyyy')}"></span>
      </p>
    </section>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">

      <div class="lg:col-span-7 space-y-12">

        <section>
          <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-4 flex items-center gap-2">
            <span class="material-symbols-outlined text-primary" th:text="#{band.preview.bio}">Bio</span>
          </h3>
          <div class="text-slate-600 dark:text-slate-400 leading-relaxed space-y-4">
            <p th:text="${band.bio}">Band biography.</p>
          </div>
        </section>

        <section>
          <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-6 flex items-center gap-2">
            <span class="material-symbols-outlined text-primary" th:text="#{band.preview.popularTracks}">Popular Tracks</span>
          </h3>
          <div class="text-slate-500 dark:text-slate-400 text-sm italic" th:text="#{band.preview.noTracks}">
            No tracks available yet.
          </div>
        </section>

      </div>

      <div class="lg:col-span-5">

        <section class="bg-slate-200/50 dark:bg-slate-800/30 p-8 rounded-2xl">
          <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-6 flex items-center gap-2">
            <i class="fa-solid fa-users text-primary"></i>
            <span th:text="#{band.preview.members}">Band Members</span>
          </h3>

          <div th:if="${#sets.isEmpty(band.artists)}"
               class="text-slate-500 dark:text-slate-400 text-sm italic"
               th:text="#{band.preview.noMembers}">
            No members added yet.
          </div>

          <div th:unless="${#sets.isEmpty(band.artists)}"
               class="flex flex-col gap-3">
            <a th:each="artist : ${band.artists}"
               th:href="@{/artists/preview(id=${artist.id})}"
               class="flex items-center gap-4 p-3 rounded-xl hover:bg-slate-300/50 dark:hover:bg-slate-700/50 transition-colors group">
              <img th:src="@{${artist.pictureUrl}}"
                   th:alt="${artist.name}"
                   class="w-12 h-12 rounded-full object-cover flex-shrink-0 ring-2 ring-transparent group-hover:ring-primary transition-all"/>
              <div class="flex flex-col">
                <span class="text-sm font-semibold text-slate-900 dark:text-white"
                      th:text="${#strings.isEmpty(artist.nickname) ? artist.name + ' ' + artist.surname : artist.nickname}">
                </span>
              </div>
              <i class="fa-solid fa-arrow-right ml-auto text-slate-400 opacity-0 group-hover:opacity-100 transition-opacity text-xs"></i>
            </a>
          </div>
        </section>

      </div>
    </div>
  </main>
</section>
</html>
