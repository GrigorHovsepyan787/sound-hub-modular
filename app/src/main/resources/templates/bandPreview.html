<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
    <title th:text="${band.name} + ' - SoundHub'">Band Preview - SoundHub</title>
</head>

<section>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
          rel="stylesheet"/>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <main class="pt-24 pb-32 px-6 max-w-screen-xl mx-auto">

        <section class="relative flex flex-col items-center text-center mb-16">

            <div class="absolute top-0 left-0">
                <a th:href="@{/bands}"
                   class="flex items-center gap-2 px-4 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full text-sm font-medium text-gray-700 dark:text-gray-200 hover:border-primary/50 dark:hover:border-primary/50 hover:shadow-sm transition-all active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-primary/80" viewBox="0 0 24 24"
                         fill="none"
                         stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                    <span th:text="#{band.preview.backToBands}">Back to Bands</span>
                </a>
            </div>

            <div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full h-40 w-40 mb-6 ring-4 ring-primary/20 shadow-xl"
                 th:style="${band.pictureUrl != null}
             ? 'background-image: url(' + ${band.getPictureUrl()} + ');'
             : 'background-color: #1978e5;'">
            </div>

            <h1 class="text-4xl md:text-5xl font-bold text-slate-900 dark:text-white mb-2 tracking-tight"
                th:text="${band.name}"></h1>
            <p class="text-slate-500 text-sm mt-1">
                <span th:text="#{band.preview.founded}">Founded at</span>
                <span th:text="${#temporals.format(band.createdDate, 'yyyy')}"></span>
            </p>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">

            <div class="lg:col-span-7 space-y-12">
                <section>
                    <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-4 flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary" th:text="#{band.preview.bio}">Bio</span>
                    </h3>
                    <div class="text-slate-600 dark:text-slate-400 leading-relaxed space-y-4">
                        <p th:text="${band.bio}">Band biography.</p>
                    </div>
                </section>
            </div>

            <div class="lg:col-span-5">
                <section class="bg-slate-200/50 dark:bg-slate-800/30 p-8 rounded-2xl">
                    <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-6 flex items-center gap-2">
                        <i class="fa-solid fa-users text-primary"></i>
                        <span th:text="#{band.preview.members}">Band Members</span>
                    </h3>

                    <div th:if="${#sets.isEmpty(band.artists)}"
                         class="text-slate-500 dark:text-slate-400 text-sm italic"
                         th:text="#{band.preview.noMembers}">
                        No members added yet.
                    </div>

                    <div th:unless="${#sets.isEmpty(band.artists)}"
                         class="flex flex-col gap-3">
                        <a th:each="artist : ${band.artists}"
                           th:href="@{/artists/preview(id=${artist.id})}"
                           class="flex items-center gap-4 p-3 rounded-xl hover:bg-slate-300/50 dark:hover:bg-slate-700/50 transition-colors group">
                            <img th:src="@{${artist.pictureUrl}}"
                                 th:alt="${artist.name}"
                                 class="w-12 h-12 rounded-full object-cover flex-shrink-0 ring-2 ring-transparent group-hover:ring-primary transition-all"/>
                            <div class="flex flex-col">
                <span class="text-sm font-semibold text-slate-900 dark:text-white"
                      th:text="${#strings.isEmpty(artist.nickname) ? artist.name + ' ' + artist.surname : artist.nickname}">
                </span>
                            </div>
                            <i class="fa-solid fa-arrow-right ml-auto text-slate-400 opacity-0 group-hover:opacity-100 transition-opacity text-xs"></i>
                        </a>
                    </div>
                </section>
            </div>
        </div>

        <section class="mt-16">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-2xl font-bold tracking-tight flex items-center gap-3">
                    <span class="material-symbols-outlined text-blue-500">trending_up</span>
                    <span th:text="#{band.preview.popularTracks}">Popular Tracks</span>
                </h2>
            </div>

            <div th:if="${songs == null or songs.isEmpty()}"
                 class="rounded-lg p-16 border-dashed border-2 border-slate-700/50 flex flex-col items-center justify-center text-center">
                <div class="w-24 h-24 bg-slate-800 rounded-full flex items-center justify-center mb-6 relative">
                    <span class="material-symbols-outlined text-slate-600 text-5xl">music_note</span>
                    <div class="absolute -top-1 -right-1 w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center border-4 border-slate-900">
                        <span class="material-symbols-outlined text-white text-sm">priority_high</span>
                    </div>
                </div>
                <h3 class="text-xl font-bold text-white mb-2" th:text="#{band.preview.noTracks}">No popular tracks
                    available yet</h3>
            </div>

            <div th:if="${songs != null and !songs.isEmpty()}"
                 class="bg-slate-900/50 rounded-2xl border border-slate-800 overflow-hidden mb-12 shadow-sm">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                        <tr class="border-b border-slate-800 bg-slate-800/50">
                            <th class="py-4 px-4"></th>
                            <th class="py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-400"
                                th:text="#{songs.table.title}">Title
                            </th>
                            <th class="py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-400 hidden md:table-cell"
                                th:text="#{songs.table.genre}">Genre
                            </th>
                            <th class="py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-400 text-right"
                                th:text="#{songs.table.duration}">Duration
                            </th>
                            <th class="py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-400 text-right"
                                th:text="#{songs.table.plays}">Play Count
                            </th>
                        </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-800">
                        <tr th:each="song, iterStat : ${songs}"
                            class="group hover:bg-white/5 transition-all cursor-pointer">

                            <td class="py-4 px-4">
                                <button type="button"
                                        th:data-id="${song.id}"
                                        th:data-title="${song.title}"
                                        th:data-performer="${song.performer}"
                                        th:data-url="${song.songUrl}"
                                        data-play-btn
                                        class="w-10 h-10 flex items-center justify-center rounded-full bg-transparent
                               group-hover:bg-brand-accent group-hover:text-white transition-all text-slate-400">
                                    <i class="fa-solid fa-play text-sm ml-0.5"></i>
                                </button>
                            </td>

                            <td class="py-4 px-6">
                                <div class="flex items-center gap-3">
                                    <span class="text-xs font-bold text-slate-500 w-4"
                                          th:text="${iterStat.count}"></span>
                                    <div>
                                        <span class="block font-semibold text-white" th:text="${song.title}"></span>
                                    </div>
                                </div>
                            </td>

                            <td class="py-4 px-6 hidden md:table-cell">
                <span class="px-2 py-1 text-[10px] font-bold uppercase tracking-widest bg-slate-800 text-slate-400 rounded-md"
                      th:text="${song.genre}"></span>
                            </td>

                            <td class="py-4 px-6 text-right font-mono text-sm text-slate-400"
                                th:text="${song.durationFormatted}"></td>

                            <td class="py-4 px-6 text-right">
                                <div class="flex items-center justify-end gap-1 text-slate-400">
                                    <i class="fa-solid fa-headphones text-sm"></i>
                                    <span class="text-sm font-mono" th:text="${song.playCount}"></span>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <script>
            (function () {
                const buttons = Array.from(document.querySelectorAll('[data-play-btn]'));
                const songs = buttons.map(btn => ({
                    id: btn.dataset.id,
                    title: btn.dataset.title,
                    performer: btn.dataset.performer,
                    url: btn.dataset.url,
                }));
                document.dispatchEvent(new CustomEvent('soundhub:register', {detail: {songs}}));
                buttons.forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.dispatchEvent(new CustomEvent('soundhub:play', {
                            detail: {
                                id: btn.dataset.id,
                                title: btn.dataset.title,
                                performer: btn.dataset.performer,
                                url: btn.dataset.url,
                                songs: songs,
                            }
                        }));
                    });
                });
            })();
        </script>

    </main>
</section>
</html>
